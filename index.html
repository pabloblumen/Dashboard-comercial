<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Comercial — ABC + Multicap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<style>
:root{--navy:#1B2A47;--navy2:#2D4073;--navy3:#3D5A99;--accent:#E8A020;--green:#1E8449;--red:#C0392B;--orange:#E67E22;--abc:#2E86AB;--mc:#7B2D8B;--bg:#F0F4FA;--card:#fff;--border:#DEE2EC;--text:#1A1A2E;--text2:#555577;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text)}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--navy2))}
.lcard{background:#fff;border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.llogo{font-size:2.5rem;margin-bottom:8px}
.ltitle{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:4px}
.lsub{font-size:.85rem;color:var(--text2);margin-bottom:32px}
.llabel{font-size:.8rem;font-weight:600;color:var(--text2);text-align:left;margin-bottom:6px;display:block;margin-top:12px}
.lsel,.linp{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;margin-bottom:4px;outline:none;color:var(--text)}
.lsel:focus,.linp:focus{border-color:var(--navy2)}
.lbtn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px}
.lbtn:hover{background:var(--navy2)}
.lerr{color:var(--red);font-size:.85rem;margin-top:8px;min-height:20px}
#app{display:none}
.topbar{background:var(--navy);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.tlogo{font-weight:800;font-size:1.05rem}
.tuser{font-size:.85rem;background:rgba(255,255,255,.15);padding:5px 14px;border-radius:20px}
.tbtn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tabs{background:#fff;border-bottom:2px solid var(--border);display:flex;padding:0 20px;gap:2px;overflow-x:auto;white-space:nowrap}
.tab{padding:14px 18px;font-size:.85rem;font-weight:600;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;flex-shrink:0}
.tab.active{color:var(--navy);border-bottom-color:var(--accent)}
.content{padding:20px;max-width:1400px;margin:0 auto}
.pane{display:none}.pane.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border-left:4px solid var(--accent)}
.kpi-lbl{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-val{font-size:1.7rem;font-weight:800;color:var(--navy);line-height:1}
.kpi-sub{font-size:.75rem;color:var(--text2);margin-top:4px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.ctitle{font-size:.9rem;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:var(--bg)}
.tbl tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tscroll{overflow-x:auto}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.73rem;font-weight:600}
.bg{background:#D5F5E3;color:var(--green)}.br{background:#FADBD8;color:var(--red)}
.bo{background:#FDEBD0;color:var(--orange)}.bb{background:#EBF5FB;color:#1A5276}.by{background:#FEF9E7;color:#7D6608}
.ri{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rpos{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.83rem;flex-shrink:0}
.gold{background:#F9E79F;color:#7D6608}.silver{background:#E8E8E8;color:#555}
.bronze{background:#FDEBD0;color:#784212}.rnorm{background:var(--bg);color:var(--text2)}.rme{background:var(--navy);color:#fff}
.rname{flex:1;font-weight:600;font-size:.88rem}.rsub{font-size:.73rem;font-weight:400;color:var(--text2)}
.rbar{flex:2}.rbg{background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.rbar-fill{height:8px;border-radius:4px}
.ramt{font-weight:800;font-size:.88rem;text-align:right;min-width:60px}
.ai{padding:12px 14px;border-radius:8px;border-left:4px solid;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
.ai.danger{background:#FADBD8;border-color:var(--red)}.ai.warning{background:#FDEBD0;border-color:var(--orange)}.ai.info{background:#EBF5FB;border-color:var(--abc)}
.ai-name{font-weight:700;font-size:.88rem}.ai-det{font-size:.78rem;color:var(--text2);margin-top:2px}.ai-amt{font-weight:800;font-size:.9rem;white-space:nowrap}
.fbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.flbl{font-size:.78rem;font-weight:600;color:var(--text2)}
.fsel{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.83rem;background:#fff;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--navy2)}
.srch{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.83rem;width:200px}
.srch:focus{outline:none;border-color:var(--navy2)}
.ch{position:relative;height:260px}.ch-sm{position:relative;height:180px}.ch-lg{position:relative;height:320px}
.empty{text-align:center;padding:36px;color:var(--text2)}.empty .ico{font-size:2.2rem;margin-bottom:8px}
.pbg{background:var(--bg);border-radius:6px;height:10px;overflow:hidden}
.pfill{height:10px;border-radius:6px}.pfill.green{background:var(--green)}.pfill.orange{background:var(--orange)}.pfill.red{background:var(--red)}
.opp-card{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px}
.opp-cname{font-weight:700;font-size:.87rem;margin-bottom:6px;color:var(--navy)}
.opp-tags{display:flex;flex-wrap:wrap;gap:5px}
.opp-tag{padding:3px 9px;border-radius:14px;font-size:.73rem;font-weight:600}
.opp-f{background:#EBF5FB;color:#1A5276}.opp-m{background:#F5EEF8;color:#6C3483}
#leaflet-map{height:500px;width:100%;border-radius:8px}
.ms-item{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--bg);border-radius:18px;font-size:.8rem;cursor:pointer;border:1.5px solid var(--border);margin:3px}
.ms-item:hover{border-color:var(--navy2)}
.ms-item input{cursor:pointer;accent-color:var(--navy)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="llogo">📊</div>
    <div class="ltitle">Dashboard Comercial</div>
    <div class="lsub">ABC Accesorios + Multicapotas · Ene–Abr 2026</div>
    <label class="llabel">¿Quién sos?</label>
    <select class="lsel" id="usr" onchange="onUsrChange()">
      <option value="">— Seleccioná tu nombre —</option>
      <option>Matias Matozza</option>
      <option>Veronica Albarracin</option>
      <option>Alejandro Contardo</option>
      <option>Nahuel Pontino</option>
      <option>Oscar Luna</option>
      <option>Hernan Villamil</option>
      <option value="gerencia">Gerencia</option>
    </select>
    <div id="pass-wrap" style="display:none">
      <label class="llabel">Contraseña</label>
      <input type="password" class="linp" id="upass" placeholder="Tu contraseña"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="lbtn" onclick="doLogin()">Ingresar →</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="tlogo">📊 Dashboard Comercial</div>
      <div class="tuser" id="tuser">—</div>
    </div>
    <button class="tbtn" onclick="doLogout()">Salir</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const GEO_ARG = HTMLEOF

# Append the rest in Python to avoid heredoc issues with special chars
with open('/home/claude/index.html','a',encoding='utf-8') as f:
    f.write(GEO_JSON + ';\n')

print("HTML part 1 written")
PYEOF
python3 /home/claude/build_html.pyconst MESES    = SD.meses || ['2026-01','2026-02','2026-03','2026-04'];
const MESES_L  = {'2026-01':'Enero','2026-02':'Febrero','2026-03':'Marzo','2026-04':'Abril'};
const GPASS    = 'abc2026';
const VPASSES  = {'Matias Matozza':'matozza','Veronica Albarracin':'albarracin','Alejandro Contardo':'contardo','Nahuel Pontino':'pontino','Oscar Luna':'luna','Hernan Villamil':'villamil'};
const VENDEDORES = ['Matias Matozza','Veronica Albarracin','Alejandro Contardo','Nahuel Pontino','Oscar Luna','Hernan Villamil'];
const VCOLORS  = {'Matias Matozza':'#2E86AB','Veronica Albarracin':'#E8A020','Alejandro Contardo':'#1E8449','Nahuel Pontino':'#8E44AD','Oscar Luna':'#E74C3C','Hernan Villamil':'#117A65'};
const MCOLORS  = {'McGard':'#1A5276','Multicap':'#1E8449','HELLA':'#E74C3C','WINBO':'#2E86AB','SONAX':'#D4AC0D','TURY':'#117A65','70Mai':'#8E44AD','OBBO':'#E67E22','FLEX':'#D35400','ROYAL PADS':'#CB4335'};
const SEGS     = ['Terminal','Terminal Toyota','Especial','Dealer / Concesionaria','Aftermarket','Aftermarket - Sonax'];
const EMPRESAS = ['ABC ACCESORIOS S.R.L.','ABC - PRESUPUESTO','MULTICAPOTAS S.R.L.'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let user=null, isGer=false, charts={}, lmap=null, llayer=null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function fmt(n){if(!n||isNaN(n))return '$0';var a=Math.abs(n);if(a>=1e9)return '$'+(n/1e9).toFixed(1)+'B';if(a>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(a>=1e3)return '$'+(n/1e3).toFixed(0)+'K';return '$'+Math.round(n).toLocaleString('es-AR');}
function fmtFull(n){return n?'$'+Math.round(n).toLocaleString('es-AR'):'$0';}
function varBadge(curr,prev){if(!prev)return '<span class="badge bb">Nuevo</span>';var d=((curr-prev)/prev*100).toFixed(0);if(curr===0)return '<span class="badge br">Sin compras</span>';if(d>=0)return '<span class="badge bg">▲ '+d+'%</span>';return '<span class="badge br">▼ '+Math.abs(d)+'%</span>';}
function dChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function kpi(lbl,val,sub,color){return '<div class="kpi" style="border-color:'+color+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';}
function switchTab(i){document.querySelectorAll('.tab').forEach(function(b,j){b.classList.toggle('active',j===i);});document.querySelectorAll('.pane').forEach(function(p,j){p.classList.toggle('active',j===i);});if(lmap)setTimeout(function(){lmap.invalidateSize();},150);}
function makeTabs(tabs){el('tabs').innerHTML=tabs.map(function(t,i){return '<button class="tab'+(i===0?' active':'')+'" onclick="switchTab('+i+')">'+t+'</button>';}).join('');el('content').innerHTML=tabs.map(function(t,i){return '<div class="pane'+(i===0?' active':'')+'" id="pane'+i+'"></div>';}).join('');}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function onUsrChange(){
  var sel=el('usr').value;
  el('pass-wrap').style.display=sel?'block':'none';
  el('upass').value='';
  el('lerr').textContent='';
}
function doLogin(){
  var sel=el('usr').value, pass=el('upass').value;
  if(!sel){el('lerr').textContent='Seleccioná tu nombre.';return;}
  if(!pass){el('lerr').textContent='Ingresá tu contraseña.';return;}
  if(sel==='gerencia'){
    if(pass!==GPASS){el('lerr').textContent='Contraseña incorrecta.';return;}
    isGer=true;user='gerencia';
  } else {
    if(!VPASSES[sel]||pass!==VPASSES[sel]){el('lerr').textContent='Contraseña incorrecta.';return;}
    isGer=false;user=sel;
  }
  el('login').style.display='none';
  el('app').style.display='block';
  el('tuser').textContent=isGer?'👔 Gerencia':'👤 '+user.split(' ')[0];
  buildApp();
}
function doLogout(){
  el('app').style.display='none';el('login').style.display='flex';
  el('usr').value='';el('upass').value='';el('pass-wrap').style.display='none';el('lerr').textContent='';
  Object.values(charts).forEach(function(c){c.destroy();});charts={};
  if(lmap){lmap.remove();lmap=null;llayer=null;}
  el('tabs').innerHTML='';el('content').innerHTML='';
  user=null;isGer=false;
}
function buildApp(){if(isGer)buildGerencia();else buildVendedor(user);}

// ════════════════════════════════════════════════════════════════════════════
// GERENCIA
// ════════════════════════════════════════════════════════════════════════════
function buildGerencia(){
  makeTabs(['📊 Resumen','👥 Vendedores','📈 Evolución Clientes','🗺️ Mapa','🔄 Frecuencia','📦 Marcas','💰 Cobranzas','🔁 Retención','🚘 VW Argentina','🔍 Filtros']);
  buildGResumen();buildGVendedores();buildGCliEvol();buildGMapa();buildGFrecuencia();buildGMarcas();buildGCobranzas();buildGRetencion();buildGVW();buildGFiltros();
}

// ── RESUMEN ───────────────────────────────────────────────────────────────────
function buildGResumen(){
  var vem=SD.venta_emp_mes, vvm=SD.venta_vend_mes;
  var abcL=MESES.reduce(function(s,m){return s+(vem['ABC ACCESORIOS S.R.L.'][m]||0);},0);
  var abcP=MESES.reduce(function(s,m){return s+(vem['ABC - PRESUPUESTO'][m]||0);},0);
  var mc=MESES.reduce(function(s,m){return s+(vem['MULTICAPOTAS S.R.L.'][m]||0);},0);
  var tot=abcL+abcP+mc;
  var mar=EMPRESAS.reduce(function(s,e){return s+(vem[e][MESES[MESES.length-1]]||0);},0);
  var pen=EMPRESAS.reduce(function(s,e){return s+(vem[e][MESES[MESES.length-2]]||0);},0);
  var ultNom=MESES_L[MESES[MESES.length-1]]||'';
  el('pane0').innerHTML=
    '<div class="kpi-grid">'+
      kpi('TOTAL '+MESES_L[MESES[0]].substring(0,3)+'–'+ultNom+' 2026',fmt(tot),'ABC + Multicap · '+MESES.length+' meses','var(--navy)')+
      kpi('ABC ACCESORIOS',fmt(abcL+abcP),'Legal + Presupuesto','var(--abc)')+
      kpi('MULTICAPOTAS',fmt(mc),'Q1–Q2 2026','var(--mc)')+
      kpi(ultNom.toUpperCase()+' 2026',fmt(mar),'vs '+(MESES_L[MESES[MESES.length-2]]||'')+': '+varBadge(mar,pen),'var(--accent)')+
      kpi('CLIENTES EN RIESGO',SD.clientes_caidos_global.length+'','Sin compras en '+ultNom,'var(--red)')+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📈 Evolución por Empresa</div><div class="ch"><canvas id="c-emp"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">👥 Ventas por Vendedor</div><div class="ch"><canvas id="c-vend"></canvas></div></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">🥧 Mix por Empresa</div><div class="ch"><canvas id="c-mix"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">📅 Evolución por Vendedor</div><div class="ch"><canvas id="c-vevol"></canvas></div></div>'+
    '</div>';
  var lbls=MESES.map(function(m){return (MESES_L[m]||m).substring(0,3);});
  setTimeout(function(){
    dChart('c-emp');
    charts['c-emp']=new Chart(el('c-emp'),{type:'bar',data:{labels:lbls,datasets:[
      {label:'ABC Legal',data:MESES.map(function(m){return vem['ABC ACCESORIOS S.R.L.'][m]||0;}),backgroundColor:'#2E86AB'},
      {label:'Presupuesto',data:MESES.map(function(m){return vem['ABC - PRESUPUESTO'][m]||0;}),backgroundColor:'#E8A020'},
      {label:'Multicap',data:MESES.map(function(m){return vem['MULTICAPOTAS S.R.L.'][m]||0;}),backgroundColor:'#7B2D8B'},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:fmt}}}}});
    var vt=VENDEDORES.map(function(v){return MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);});
    dChart('c-vend');
    charts['c-vend']=new Chart(el('c-vend'),{type:'bar',data:{labels:VENDEDORES.map(function(v){return v.split(' ')[0];}),datasets:[{data:vt,backgroundColor:VENDEDORES.map(function(v){return VCOLORS[v]||'#888';})}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmt}}}}});
    dChart('c-mix');
    charts['c-mix']=new Chart(el('c-mix'),{type:'doughnut',data:{labels:['ABC Legal','Presupuesto','Multicap'],datasets:[{data:[abcL,abcP,mc],backgroundColor:['#2E86AB','#E8A020','#7B2D8B']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
    dChart('c-vevol');
    charts['c-vevol']=new Chart(el('c-vevol'),{type:'line',data:{labels:lbls,datasets:VENDEDORES.map(function(v){return{label:v.split(' ')[0],data:MESES.map(function(m){return vvm[v][m]||0;}),borderColor:VCOLORS[v]||'#888',backgroundColor:'transparent',tension:.3,pointRadius:4};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:fmt}}}}});
  },50);
}

// ── VENDEDORES (gerencia) ─────────────────────────────────────────────────────
function buildGVendedores(){
  var vvm=SD.venta_vend_mes;
  var sorted=VENDEDORES.slice().sort(function(a,b){return MESES.reduce(function(s,m){return s+(vvm[b][m]||0);},0)-MESES.reduce(function(s,m){return s+(vvm[a][m]||0);},0);});
  var maxT=MESES.reduce(function(s,m){return s+(vvm[sorted[0]][m]||0);},0);
  var avgT=sorted.reduce(function(s,v){return s+MESES.reduce(function(a,m){return a+(vvm[v][m]||0);},0);},0)/sorted.length;
  var pc=['gold','silver','bronze','rnorm','rnorm','rnorm'];
  var rankHTML=sorted.map(function(v,i){
    var t=MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
    var pct=Math.round(t/maxT*100);
    var ncli=Object.keys(SD.vendedor_detalle[v].clientes_mes[MESES[MESES.length-1]]||{}).length;
    return '<div class="ri"><div class="rpos '+pc[i]+'">'+(i+1)+'</div>'+
      '<div class="rname">'+v.split(' ')[0]+'<div class="rsub">'+ncli+' clientes · '+pct+'% del líder</div></div>'+
      '<div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+pct+'%;background:'+VCOLORS[v]+'"></div></div></div>'+
      '<div class="ramt" style="color:'+VCOLORS[v]+'">'+pct+'%</div></div>';
  }).join('');
  var tblHTML='<div class="tscroll"><table class="tbl"><thead><tr><th>Vendedor</th><th class="num">% del Líder</th><th>vs Promedio</th><th>Tendencia</th><th class="num">Clientes</th></tr></thead><tbody>'+
    sorted.map(function(v){
      var t=MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
      var pct=Math.round(t/maxT*100);
      var vsAvg=Math.round((t-avgT)/avgT*100);
      var e=vvm[v][MESES[0]]||0, ult=vvm[v][MESES[MESES.length-1]]||0;
      var ncli=Object.keys(SD.vendedor_detalle[v].clientes_mes[MESES[MESES.length-1]]||{}).length;
      var avgBadge=vsAvg>=0?'<span class="badge bg">▲ '+vsAvg+'%</span>':'<span class="badge br">▼ '+Math.abs(vsAvg)+'%</span>';
      return '<tr><td><b>'+v.split(' ')[0]+'</b></td><td class="num"><b>'+pct+'%</b></td><td>'+avgBadge+'</td><td>'+varBadge(ult,e)+'</td><td class="num">'+ncli+'</td></tr>';

const PROV_MAP={'Buenos Aires':'Buenos Aires','Ciudad Autónoma de Buenos Aires':'CABA','Córdoba':'Córdoba','Santa Fe':'Santa Fe','Entre Ríos':'Entre Ríos','Mendoza':'Mendoza','Tucumán':'Tucumán','Salta':'Salta','Jujuy':'Jujuy','Chaco':'Chaco','Formosa':'Formosa','Misiones':'Misiones','Corrientes':'Corrientes','La Rioja':'La Rioja','Catamarca':'Catamarca','San Juan':'San Juan','San Luis':'San Luis','La Pampa':'La Pampa','Santiago del Estero':'Santiago del Estero','Neuquén':'Neuquén','Río Negro':'Río Negro','Chubut':'Chubut','Santa Cruz':'Santa Cruz','Tierra del Fuego':'Tierra del Fuego'};
function buildGMapa(){

      '<span class="flbl">Familia:</span><select class="fsel" id="mfamilia" onchange="onMF(\'f\')"><option value="">Todas</option>'+fl.map(function(f){return '<option>'+f+'</option>';}).join('')+'</select>'+

    '</div><div id="leaflet-map"></div></div>'+

function getMapData(){var m=el('mmarca')?.value,f=el('mfamilia')?.value,v=el('mvendedor')?.value;if(m)return SD.geo.marcas[m]||{};if(f)return SD.geo.familias[f]||{};if(v)return SD.geo.vendedores[v]||{};return SD.geo.total||{};}
function onMF(t){if(t==='m'){el('mfamilia').value='';el('mvendedor').value='';}if(t==='f'){el('mmarca').value='';el('mvendedor').value='';}if(t==='v'){el('mmarca').value='';el('mfamilia').value='';}refreshMap();renderProvRank();}
function provColor(v,max){if(!v||v===0)return '#E8ECF4';var t=0.15+0.85*(v/max);return 'rgb('+Math.round(61*(1-t)+27*t)+','+Math.round(90*(1-t)+42*t)+','+Math.round(153*(1-t)+71*t)+')';}
function initMap(){if(lmap){lmap.remove();lmap=null;llayer=null;}lmap=L.map('leaflet-map',{center:[-40,-65],zoom:4,zoomControl:true,scrollWheelZoom:false,attributionControl:false});refreshMap();}
function refreshMap(){
  if(!lmap)return;
  var md=getMapData(),metric=el('mmetric')?.value||'importe';
  var vals=Object.values(md).map(function(d){return metric==='importe'?d.importe:d.clientes;});
  var maxV=Math.max.apply(null,vals.concat([1]));
  if(llayer){llayer.remove();llayer=null;}
  llayer=L.geoJSON(GEO_ARG,{
    style:function(f){var pk=PROV_MAP[f.properties.name]||f.properties.name,d=md[pk],val=d?(metric==='importe'?d.importe:d.clientes):0;return{fillColor:provColor(val,maxV),fillOpacity:val>0?.85:.4,color:'white',weight:1.5};},
    onEachFeature:function(f,layer){
      var pk=PROV_MAP[f.properties.name]||f.properties.name,d=md[pk];
      var lbl=d?(metric==='importe'?fmt(d.importe):d.clientes+' clientes'):'Sin datos';
      layer.bindTooltip('<b>'+f.properties.name+'</b><br>'+lbl,{sticky:true,opacity:.95});
      layer.on({mouseover:function(e){e.target.setStyle({weight:3,color:'#E8A020',fillOpacity:.95});},mouseout:function(e){llayer.resetStyle(e.target);},click:function(){showProv(pk);}});
    }
  }).addTo(lmap);
  lmap.setView([-40,-65],4);
  renderProvRank();
}
function renderProvRank(){
  var md=getMapData(),metric=el('mmetric')?.value||'importe';
  var list=Object.entries(md).map(function(e){return{p:e[0],v:metric==='importe'?e[1].importe:e[1].clientes,d:e[1]};}).filter(function(x){return x.v>0;}).sort(function(a,b){return b.v-a.v;});
  var maxR=list[0]?list[0].v:1,pc=['gold','silver','bronze'];
  if(el('prov-rank'))el('prov-rank').innerHTML=list.map(function(item,i){var lbl=metric==='importe'?fmt(item.v):item.v+' clientes',sub=metric==='importe'?item.d.clientes+' clientes':fmt(item.d.importe);return '<div class="ri" style="cursor:pointer" onclick="showProv(\''+item.p+'\')"><div class="rpos '+(pc[i]||'rnorm')+'">'+(i+1)+'</div><div class="rname">'+item.p+'<div class="rsub">'+sub+'</div></div><div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+Math.round(item.v/maxR*100)+'%;background:var(--navy2)"></div></div></div><div class="ramt">'+lbl+'</div></div>';}).join('');
}
function showProv(prov){var d=getMapData()[prov];if(!d)return;el('prov-det-card').style.display='block';el('prov-det-name').textContent=prov;el('prov-det').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+kpi('Facturación',fmt(d.importe),'','var(--navy)')+kpi('Clientes',d.clientes+'','','var(--accent)')+'</div><div style="font-size:.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:8px">Top clientes</div>'+d.top_clientes.map(function(c){return '<div class="ai info"><div><div class="ai-name" style="font-size:.83rem">'+c.nombre+'</div><div class="ai-det">'+(c.localidad?c.localidad+' · ':'')+c.segmento+'</div></div><div class="ai-amt" style="font-size:.83rem">'+fmt(c.importe)+'</div></div>';}).join('');}

  },50);

function applyVF(v){
  var mesesF=Array.from(document.querySelectorAll('.vf-mes:checked')).map(function(c){return c.value;});
  if(!mesesF.length)mesesF=MESES;
  var cliF=el('vf-cli')?.value||'', marcaF=el('vf-marca')?.value||'', met=el('vf-met')?.value||'importe';
  var txns=(SD.txn_summary||[]).filter(function(t){return t.vendedor===v&&mesesF.includes(t.mes)&&(!cliF||t.cliente===cliF)&&(!marcaF||t.marca===marcaF);});
  var getV=function(t){return met==='cantidad'?t.cantidad:t.importe;};
  var totF=txns.reduce(function(s,t){return s+getV(t);},0);
  var byMes={},byCli={},byMarca={},byFam={};
  mesesF.forEach(function(m){byMes[m]=0;});
  txns.forEach(function(t){byMes[t.mes]=(byMes[t.mes]||0)+getV(t);byCli[t.cliente]=(byCli[t.cliente]||0)+getV(t);byMarca[t.marca]=(byMarca[t.marca]||0)+getV(t);byFam[t.familia]=(byFam[t.familia]||0)+getV(t);});
  var col=VCOLORS[v]||'#2E86AB';
  if(el('v-kpis'))el('v-kpis').innerHTML=kpi('Total filtrado',met==='cantidad'?Math.round(totF)+' uds':fmt(totF),mesesF.map(function(m){return (MESES_L[m]||m).substring(0,3);}).join(', '),'var(--navy)')+kpi('Clientes',Object.keys(byCli).length+'','','var(--green)')+kpi('Marcas',Object.keys(byMarca).filter(function(m){return m!=='Sin Marca';}).size||Object.keys(byMarca).filter(function(m){return m!=='Sin Marca';}).length+'','','var(--abc)');
  var impM=mesesF.map(function(m){return byMes[m]||0;});
  var topC=Object.entries(byCli).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var topM=Object.entries(byMarca).filter(function(e){return e[1]>0&&e[0]!=='Sin Marca';}).sort(function(a,b){return b[1]-a[1];});
  var topF=Object.entries(byFam).filter(function(e){return e[1]>0&&e[0]!=='Sin Familia';}).sort(function(a,b){return b[1]-a[1];});
  renderVCharts(v,topC,topM,topF,impM,col,met,mesesF);
}

function renderVCharts(v,topCli,topMarcas,topFams,imp_meses,col,met,mesesOverride){
  var lbls=(mesesOverride||MESES).map(function(m){return (MESES_L[m]||m).substring(0,3);});
  var yFmt=met==='cantidad'?function(x){return Math.round(x)+'u';}:fmt;
  var COLS=['#2E86AB','#E8A020','#1E8449','#C0392B','#7B2D8B','#117A65','#D35400','#8E44AD','#1A5276','#784212'];
  dChart('c-v-evol');
  charts['c-v-evol']=new Chart(el('c-v-evol'),{type:'bar',data:{labels:lbls,datasets:[{data:imp_meses,backgroundColor:imp_meses.map(function(){return col;})}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:yFmt}}}}});
  if(topCli.length){dChart('c-v-cli');charts['c-v-cli']=new Chart(el('c-v-cli'),{type:'bar',data:{labels:topCli.map(function(e){return e[0].length>18?e[0].substring(0,18)+'…':e[0];}),datasets:[{data:topCli.map(function(e){return e[1];}),backgroundColor:COLS}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:yFmt}}}}});}
  if(topMarcas.length){dChart('c-v-marca');charts['c-v-marca']=new Chart(el('c-v-marca'),{type:'bar',data:{labels:topMarcas.slice(0,10).map(function(e){return e[0];}),datasets:[{data:topMarcas.slice(0,10).map(function(e){return e[1];}),backgroundColor:topMarcas.slice(0,10).map(function(e){return MCOLORS[e[0]]||'#888';})}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:yFmt}}}}});}
  if(topFams.length){dChart('c-v-fam');charts['c-v-fam']=new Chart(el('c-v-fam'),{type:'doughnut',data:{labels:topFams.slice(0,10).map(function(e){return e[0];}),datasets:[{data:topFams.slice(0,10).map(function(e){return e[1];}),backgroundColor:COLS}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}}}});}
}

// ── LLAMADOS ──────────────────────────────────────────────────────────────────
function buildVLlamados(v){
  var det=SD.vendedor_detalle[v], vvm=SD.venta_vend_mes;
  var mar=vvm[v][MESES[MESES.length-1]]||0, pen=vvm[v][MESES[MESES.length-2]]||0;
  var caidos=det.clientes_caidos||[], riesgo=det.clientes_riesgo||[];
  var ultNom=MESES_L[MESES[MESES.length-1]]||'', penNom=MESES_L[MESES[MESES.length-2]]||'';
  el('pane1').innerHTML=
    '<div class="kpi-grid">'+kpi('Tus ventas — '+ultNom,fmt(mar),'vs '+penNom+': '+varBadge(mar,pen),'var(--navy)')+kpi('Para llamar',caidos.length+'','sin compras en '+ultNom,'var(--red)')+kpi('En riesgo',riesgo.length+'','bajaron >40%','var(--orange)')+'</div>'+
    '<div class="card"><div class="ctitle">📞 Sin compras en '+ultNom+'</div>'+
    (caidos.length===0?'<div class="empty"><div class="ico">✅</div><p>¡Todos tus clientes compraron en '+ultNom+'!</p></div>':
    '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Segmento</th><th>Último mes</th></tr></thead><tbody>'+
    caidos.map(function(c){return '<tr><td><b>'+c.cliente+'</b></td><td><span class="badge bb">'+c.segmento+'</span></td><td>'+(MESES_L[c.ultimo_mes]||c.ultimo_mes)+'</td></tr>';}).join('')+'</tbody></table></div>')+'</div>'+
    (riesgo.length?'<div class="card"><div class="ctitle">📉 Posible reemplazo de proveedor</div>'+riesgo.map(function(c){return '<div class="ai warning"><div><div class="ai-name">'+c.cliente+'</div><div class="ai-det">Caída '+Math.abs(c.caida_pct)+'% vs su pico</div></div><div class="ai-amt" style="color:var(--red)">▼ '+Math.abs(c.caida_pct)+'%</div></div>';}).join('')+'</div>':'');
}

// ── OPORTUNIDADES ─────────────────────────────────────────────────────────────
function buildVOportunidades(v){
  var det=SD.vendedor_detalle[v];
  var oppF=det.oportunidades_familias||{}, oppM=det.oportunidades_marcas||{};
  var clis=Object.keys(Object.assign({},oppF,oppM)).sort();
  el('pane2').innerHTML=
    '<p style="font-size:.85rem;color:var(--text2);margin-bottom:16px">Familias y marcas que todavía no vendés a clientes que ya tenés.</p>'+
    '<div class="fbar"><input type="text" class="srch" id="osrch" placeholder="Buscar cliente..." oninput="renderOpps(\''+v+'\')">'+
    '<select class="fsel" id="otype" onchange="renderOpps(\''+v+'\')"><option value="ambos">Familias + Marcas</option><option value="familias">Solo Familias</option><option value="marcas">Solo Marcas</option></select></div>'+
    '<div id="opp-cont"></div>';
  window._oppF=oppF;window._oppM=oppM;window._oppClis=clis;
  renderOpps(v);
}
function renderOpps(v){
  var srch=(el('osrch')?.value||'').toLowerCase(), type=el('otype')?.value||'ambos';
  var clis=(window._oppClis||[]).filter(function(c){return c.toLowerCase().includes(srch);});
  var html=clis.slice(0,40).map(function(c){
    var fams=type!=='marcas'?(window._oppF[c]||[]):[];
    var marcas=type!=='familias'?(window._oppM[c]||[]):[];
    if(!fams.length&&!marcas.length)return '';
    return '<div class="opp-card"><div class="opp-cname">'+c+'</div><div class="opp-tags">'+fams.map(function(f){return '<span class="opp-tag opp-f">📦 '+f+'</span>';}).join('')+marcas.map(function(m){return '<span class="opp-tag opp-m">🏷️ '+m+'</span>';}).join('')+'</div></div>';
  }).join('');
  if(el('opp-cont'))el('opp-cont').innerHTML=html||'<div class="empty"><div class="ico">🔍</div><p>Sin resultados</p></div>';
}

// ── RIESGO ────────────────────────────────────────────────────────────────────
function buildVRiesgo(v){
  var det=SD.vendedor_detalle[v], caidos=det.clientes_caidos||[], riesgo=det.clientes_riesgo||[];
  el('pane3').innerHTML=
    '<div class="card"><div class="ctitle">🔴 Sin compras en '+( MESES_L[MESES[MESES.length-1]]||'')+'</div>'+
    (caidos.length===0?'<div class="empty"><div class="ico">✅</div><p>Todos tus clientes compraron</p></div>':
    '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Segmento</th><th class="num">Historial</th><th>Último mes</th></tr></thead><tbody>'+
    caidos.map(function(c){return '<tr><td><b>'+c.cliente+'</b></td><td><span class="badge bb">'+c.segmento+'</span></td><td class="num">'+fmtFull(c.total_hist)+'</td><td>'+(MESES_L[c.ultimo_mes]||c.ultimo_mes)+'</td></tr>';}).join('')+'</tbody></table></div>')+'</div>'+
    '<div class="card"><div class="ctitle">📉 Posible reemplazo de proveedor</div>'+
    (riesgo.length===0?'<div class="empty"><div class="ico">✅</div><p>Sin caídas importantes</p></div>':
    '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Segmento</th><th class="num">Pico</th><th class="num">Último mes</th><th>Caída</th></tr></thead><tbody>'+
    riesgo.map(function(c){return '<tr><td><b>'+c.cliente+'</b></td><td><span class="badge bb">'+c.segmento+'</span></td><td class="num">'+fmtFull(c.mejor_mes)+'</td><td class="num">'+fmtFull(c.marzo)+'</td><td><span class="badge br">▼ '+Math.abs(c.caida_pct)+'%</span></td></tr>';}).join('')+'</tbody></table></div>')+'</div>';
}

// ── RANKING ───────────────────────────────────────────────────────────────────
function buildVRanking(v){
  var vvm=SD.venta_vend_mes;
  var sorted=VENDEDORES.slice().sort(function(a,b){return MESES.reduce(function(s,m){return s+(vvm[b][m]||0);},0)-MESES.reduce(function(s,m){return s+(vvm[a][m]||0);},0);});
  var myPos=sorted.indexOf(v)+1;
  var myTot=MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
  var maxT=MESES.reduce(function(s,m){return s+(vvm[sorted[0]][m]||0);},0);
  var above=sorted[myPos-2];
  var gap=above?MESES.reduce(function(s,m){return s+(vvm[above][m]||0);},0)-myTot:0;
  var pc=['gold','silver','bronze','rnorm','rnorm','rnorm'];
  var myPct=Math.round(myTot/maxT*100);
  el('pane4').innerHTML=
    '<div class="kpi-grid">'+
      kpi('Tu posición',myPos+'° de '+VENDEDORES.length,'Ranking período','var(--accent)')+
      kpi('% del líder',myPct+'%','tu performance relativa','var(--navy)')+
      (myPos>1?kpi('Para subir al '+(myPos-1)+'°',fmt(gap),'vs '+above.split(' ')[0],'var(--orange)'):kpi('Posición','🥇 Líder','¡Vas primero!','var(--green)'))+
    '</div>'+
    '<div class="card"><div class="ctitle">🏆 Ranking del equipo — % del líder</div>'+
    sorted.map(function(sv,i){
      var t=MESES.reduce(function(s,m){return s+(vvm[sv][m]||0);},0);
      var pct=Math.round(t/maxT*100);
      var isMe=sv===v;
      var ncli=Object.keys(SD.vendedor_detalle[sv].clientes_mes[MESES[MESES.length-1]]||{}).length;
      return '<div class="ri" style="'+(isMe?'background:#FEF9E7;border-radius:8px;padding:10px':'')+'">'+
        '<div class="rpos '+(isMe?'rme':pc[i])+'">'+(i+1)+'</div>'+
        '<div class="rname">'+sv.split(' ')[0]+(isMe?' <b style="color:var(--accent)">(vos)</b>':'')+
          '<div class="rsub">'+ncli+' clientes · '+pct+'%</div></div>'+
        '<div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+pct+'%;background:'+(isMe?'var(--accent)':VCOLORS[sv]||'#888')+'"></div></div></div>'+
        '<div class="ramt" style="color:'+(isMe?'var(--accent)':VCOLORS[sv]||'#888')+'">'+pct+'%</div></div>';
    }).join('')+'</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📊 Tu evolución vs el equipo</div><div class="ch"><canvas id="c-rk-evol"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">📅 Comparativa mensual</div><div class="ch"><canvas id="c-rk-mes"></canvas></div></div>'+
    '</div>';
  var lbls=MESES.map(function(m){return (MESES_L[m]||m).substring(0,3);});
  setTimeout(function(){
    dChart('c-rk-evol');
    charts['c-rk-evol']=new Chart(el('c-rk-evol'),{type:'line',data:{labels:lbls,datasets:sorted.map(function(sv){return{label:sv.split(' ')[0]+(sv===v?' (vos)':''),data:MESES.map(function(m){return vvm[sv][m]||0;}),borderColor:sv===v?'#E8A020':VCOLORS[sv]||'#ccc',borderWidth:sv===v?3:1.5,backgroundColor:'transparent',tension:.3,pointRadius:sv===v?6:3};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:fmt}}}}});
    dChart('c-rk-mes');
    charts['c-rk-mes']=new Chart(el('c-rk-mes'),{type:'bar',data:{labels:lbls,datasets:sorted.map(function(sv){return{label:sv.split(' ')[0],data:MESES.map(function(m){return vvm[sv][m]||0;}),backgroundColor:VCOLORS[sv]||'#888'};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:fmt}}}}});
  },50);
}

// ── COMISIONES ────────────────────────────────────────────────────────────────
function buildVComisiones(v){
  var com=SD.comisiones;
  if(!com){el('pane5').innerHTML='<div class="empty"><div class="ico">—</div><p>Sin datos de comisiones</p></div>';return;}
  var pm=com.por_mes[v]||{}, tot=com.totales[v]||{}, pf=com.por_familia[v]||{}, pc_cli=com.por_cliente[v]||{};
  var mc=com.meses||[], ML_c=com.meses_label||{};
  var col=VCOLORS[v]||'#2E86AB';
  var impM=mc.map(function(m){return pm[m]||0;});
  var topF=Object.entries(pf).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var topC=Object.entries(pc_cli).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var COLS=['#2E86AB','#E8A020','#1E8449','#C0392B','#7B2D8B','#117A65','#D35400','#8E44AD','#1A5276','#784212'];
  el('pane5').innerHTML=
    '<div class="kpi-grid">'+
      kpi('Comisión Total',fmt(tot.comision_total||0),'Acumulada Ene-Abr','var(--green)')+
      kpi('% Promedio',(tot.pct_promedio||0)+'%','Tasa promedio de comisión','var(--navy)')+
      kpi('Cobrado total',fmt(tot.cobrado_total||0),'base de cálculo','var(--abc)')+
      kpi('Operaciones',(tot.n_operaciones||0)+'','cobros comisionados','var(--accent)')+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📈 Evolución de comisiones</div><div class="ch"><canvas id="c-com-evol"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">💰 Comisión acumulada</div><div class="ch"><canvas id="c-com-acum"></canvas></div></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📦 Por Familia</div><div class="tscroll"><table class="tbl"><thead><tr><th>Familia</th><th class="num">Comisión</th></tr></thead><tbody>'+topF.map(function(e){return '<tr><td>'+e[0]+'</td><td class="num"><b>'+fmt(e[1])+'</b></td></tr>';}).join('')+'</tbody></table></div></div>'+
      '<div class="card"><div class="ctitle">🏆 Por Cliente</div><div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th class="num">Comisión</th></tr></thead><tbody>'+topC.map(function(e){return '<tr><td>'+e[0]+'</td><td class="num"><b>'+fmt(e[1])+'</b></td></tr>';}).join('')+'</tbody></table></div></div>'+
    '</div>';
  setTimeout(function(){
    dChart('c-com-evol');
    charts['c-com-evol']=new Chart(el('c-com-evol'),{type:'bar',data:{labels:mc.map(function(m){return ML_c[m]||m;}),datasets:[{data:impM,backgroundColor:impM.map(function(){return col;})}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmt}}}}});
    var acum=0, acumData=impM.map(function(x){acum+=x;return acum;});
    dChart('c-com-acum');
    charts['c-com-acum']=new Chart(el('c-com-acum'),{type:'line',data:{labels:mc.map(function(m){return ML_c[m]||m;}),datasets:[{data:acumData,borderColor:col,backgroundColor:col+'22',fill:true,tension:.3,pointRadius:6,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmt}}}}});
  },50);
}
</script>
