<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --navy: #1B2A47; --navy2: #2D4073; --navy3: #3D5A99;
  --accent: #E8A020; --accent2: #27AE60; --accent3: #E74C3C;
  --accent4: #8E44AD;
  --abc: #2E86AB; --mc: #7B2D8B;
  --bg: #F0F4FA; --card: #FFFFFF;
  --text: #1A1A2E; --text2: #555577;
  --border: #DEE2EC;
  --green: #1E8449; --green-light: #D5F5E3;
  --red: #C0392B; --red-light: #FADBD8;
  --orange: #E67E22; --orange-light: #FDEBD0;
  --yellow-light: #FEF9E7;
  --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%); }
.login-card { background: white; border-radius: 20px; padding: 48px 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align:center; }
.login-logo { font-size: 2.5rem; margin-bottom: 8px; }
.login-title { font-size: 1.4rem; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
.login-sub { font-size: 0.85rem; color: var(--text2); margin-bottom: 32px; }
.login-label { font-size: 0.8rem; font-weight: 600; color: var(--text2); text-align:left; margin-bottom: 6px; display:block; }
.login-select, .login-input {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border);
  border-radius: 10px; font-size: 0.95rem; margin-bottom: 16px;
  transition: border-color 0.2s; outline: none; color: var(--text);
}
.login-select:focus, .login-input:focus { border-color: var(--navy2); }
.login-btn {
  width: 100%; padding: 14px; background: var(--navy);
  color: white; border: none; border-radius: 10px; font-size: 1rem;
  font-weight: 700; cursor: pointer; transition: background 0.2s;
}
.login-btn:hover { background: var(--navy2); }
.login-error { color: var(--red); font-size: 0.85rem; margin-top: 8px; display:none; }
.login-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* LAYOUT */
#app { display:none; }
.topbar {
  background: var(--navy); color: white; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.topbar-left { display:flex; align-items:center; gap: 16px; }
.topbar-logo { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
.topbar-user { font-size: 0.85rem; background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px; }
.topbar-right { display:flex; gap:8px; }
.logout-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 14px; border-radius: 8px; cursor:pointer; font-size:0.85rem; }
.logout-btn:hover { background: rgba(255,255,255,0.2); }

/* TABS */
.tabs { background: white; border-bottom: 1px solid var(--border); display:flex; padding: 0 24px; gap: 4px; overflow-x:auto; }
.tab-btn {
  padding: 16px 20px; font-size: 0.88rem; font-weight: 600; color: var(--text2);
  border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent;
  white-space: nowrap; transition: all 0.2s;
}
.tab-btn:hover { color: var(--navy); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--accent); }

/* CONTENT */
.content { padding: 24px; max-width: 1400px; margin: 0 auto; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--card); border-radius: var(--radius); padding: 20px 24px;
  box-shadow: var(--shadow); border-left: 4px solid var(--accent);
}
.kpi-label { font-size: 0.75rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.kpi-value { font-size: 1.8rem; font-weight: 800; color: var(--navy); line-height: 1; }
.kpi-sub { font-size: 0.78rem; color: var(--text2); margin-top: 4px; }
.kpi-up { color: var(--green); } .kpi-down { color: var(--red); }

.card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
.card-title { font-size: 0.95rem; font-weight: 700; color: var(--navy); margin-bottom: 16px; display:flex; align-items:center; gap:8px; }
.card-title span { font-size: 1.1rem; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media(max-width:900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* TABLES */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.data-table th { background: var(--navy); color: white; padding: 10px 14px; text-align:left; font-weight: 600; font-size: 0.78rem; text-transform:uppercase; letter-spacing:0.3px; }
.data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.data-table tr:hover td { background: var(--bg); }
.data-table tr:last-child td { border-bottom: none; }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-orange { background: var(--orange-light); color: var(--orange); }
.badge-yellow { background: var(--yellow-light); color: #7D6608; }
.badge-blue { background: #EBF5FB; color: #1A5276; }

/* ALERTS */
.alert-list { display: flex; flex-direction:column; gap: 10px; }
.alert-item {
  padding: 14px 16px; border-radius: 10px; border-left: 4px solid;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.alert-item.danger { background: var(--red-light); border-color: var(--red); }
.alert-item.warning { background: var(--orange-light); border-color: var(--orange); }
.alert-item.info { background: #EBF5FB; border-color: #2E86AB; }
.alert-item.success { background: var(--green-light); border-color: var(--green); }
.alert-name { font-weight: 700; font-size: 0.9rem; }
.alert-detail { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.alert-amount { font-weight: 800; font-size: 0.95rem; white-space:nowrap; }

/* RANKING */
.ranking-item {
  display:flex; align-items:center; gap:14px; padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.ranking-item:last-child { border-bottom: none; }
.rank-pos { width: 32px; height: 32px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.85rem; flex-shrink:0; }
.rank-pos.gold { background: #F9E79F; color: #7D6608; }
.rank-pos.silver { background: #E8E8E8; color: #555; }
.rank-pos.bronze { background: #FDEBD0; color: #784212; }
.rank-pos.normal { background: var(--bg); color: var(--text2); }
.rank-pos.me { background: var(--navy); color: white; }
.rank-name { flex:1; font-weight: 600; font-size: 0.9rem; }
.rank-name .rank-sub { font-size: 0.75rem; font-weight:400; color: var(--text2); }
.rank-bar-wrap { flex: 2; }
.rank-bar-bg { background: var(--bg); border-radius: 4px; height: 8px; overflow:hidden; }
.rank-bar { height: 8px; border-radius: 4px; background: var(--navy2); }
.rank-bar.me { background: var(--accent); }
.rank-amount { font-weight: 800; font-size: 0.9rem; text-align:right; min-width:90px; }

/* FILTERS */
.filter-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 20px; align-items:center; }
.filter-select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.85rem; background: white; color: var(--text); cursor:pointer; }
.filter-select:focus { outline:none; border-color: var(--navy2); }
.filter-label { font-size: 0.8rem; font-weight:600; color: var(--text2); }

/* PROGRESS */
.progress-wrap { margin-bottom: 12px; }
.progress-label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:4px; }
.progress-label .pct { font-weight:700; }
.progress-bg { background: var(--bg); border-radius: 6px; height: 12px; overflow:hidden; }
.progress-bar { height: 12px; border-radius: 6px; transition: width 0.6s ease; }
.progress-bar.green { background: var(--green); }
.progress-bar.orange { background: var(--orange); }
.progress-bar.red { background: var(--red); }

/* MONTH TABS */
.month-tabs { display:flex; gap:8px; margin-bottom:16px; }
.month-tab { padding: 6px 18px; border-radius: 20px; font-size:0.82rem; font-weight:600; cursor:pointer; border: 1.5px solid var(--border); background:white; color: var(--text2); transition: all 0.2s; }
.month-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

/* OPPORTUNITY MATRIX */
.opp-grid { display: grid; gap: 12px; }
.opp-client-card { background: var(--bg); border-radius: 10px; padding: 14px; }
.opp-client-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; color: var(--navy); }
.opp-tags { display:flex; flex-wrap:wrap; gap:6px; }
.opp-tag { padding: 4px 10px; border-radius: 16px; font-size: 0.75rem; font-weight:600; }
.opp-tag.familia { background: #EBF5FB; color: #1A5276; }
.opp-tag.marca { background: #F5EEF8; color: #6C3483; }

/* CHART containers */
.chart-wrap { position:relative; height: 280px; }
.chart-wrap-sm { position:relative; height: 200px; }

/* SECTION HEADER */
.section-header { font-size: 1.1rem; font-weight: 800; color: var(--navy); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }

/* EMPTY STATE */
.empty-state { text-align:center; padding: 40px; color: var(--text2); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

/* EMPRESA BADGE */
.emp-abc { color: var(--abc); font-weight:700; }
.emp-mc { color: var(--mc); font-weight:700; }

/* SCROLLABLE TABLE */
.table-scroll { overflow-x: auto; }

/* SEARCH */
.search-input { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size:0.85rem; width: 240px; }
.search-input:focus { outline:none; border-color: var(--navy2); }
</style>
</head>

let currentUser = null;

// LOGIN
// ══════════════════════════════════════════════════════════════════════════════
document.getElementById('user-select').addEventListener('change', function() {
  document.getElementById('gerencia-pass-wrap').style.display =
    this.value === 'gerencia' ? 'block' : 'none';
});

function doLogin() {
  const sel = document.getElementById('user-select').value;
  if (!sel) return;
  if (sel === 'gerencia') {
    const pass = document.getElementById('gerencia-pass').value;
    if (pass !== GERENCIA_PASS) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    isGerencia = true;
    currentUser = 'gerencia';
  } else {
    isGerencia = false;
    currentUser = sel;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-user-label').textContent =
    isGerencia ? '👔 Gerencia' : `👤 ${currentUser}`;
  buildApp();
}

function doLogout() {
  currentUser = null; isGerencia = false;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('user-select').value = '';
  document.getElementById('gerencia-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('gerencia-pass-wrap').style.display = 'none';
  document.getElementById('main-tabs').innerHTML = '';
  document.getElementById('main-content').innerHTML = '';
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function fmt(n) {
  if (!n || isNaN(n)) return '$0';
  if (Math.abs(n) >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString('es-AR');
}
function fmtFull(n) {
  if (!n) return '$0';
  return '$' + Math.round(n).toLocaleString('es-AR');
}
function pct(a, b) { return b ? ((a/b-1)*100).toFixed(1) + '%' : '—'; }
function pctNum(a, b) { return b ? ((a/b)*100).toFixed(0) : 0; }
function varBadge(curr, prev) {
  if (!prev) return '<span class="badge badge-blue">Nuevo</span>';
  const d = ((curr - prev) / prev * 100).toFixed(0);
  if (curr === 0) return '<span class="badge badge-red">Sin compras</span>';
  if (d >= 0) return `<span class="badge badge-green">▲ ${d}%</span>`;
  return `<span class="badge badge-red">▼ ${Math.abs(d)}%</span>`;
}
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-pane').forEach((p,i) => p.classList.toggle('active', i===idx));
  activeTab = idx;
}

function buildGerencia() {
  const tabs = ['📊 Resumen','👥 Vendedores','⚠️ Riesgo Clientes','🎯 Blancos','📦 Marcas'];
  const tabsEl = document.getElementById('main-tabs');
  tabsEl.innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`
  ).join('');

  const content = document.getElementById('main-content');
  content.innerHTML = tabs.map((t,i) =>
    `<div class="tab-pane ${i===0?'active':''}" id="pane-${i}"></div>`
  ).join('');

  buildGResumen();
  buildGVendedores();
  buildGRiesgo();
  buildGBlancos();
  buildGMarcas();
}

function filterOpps(vend) {
  const search = document.getElementById('opp-search').value.toLowerCase();
  const type = document.getElementById('opp-type').value;
  const { oppFam, oppMarca, cliList } = window._oppData;

  const filtered = cliList.filter(c => c.toLowerCase().includes(search));
  const container = document.getElementById('opp-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No se encontraron clientes</p></div>';
    return;
  }

  container.innerHTML = `<div class="opp-grid">
    ${filtered.slice(0,40).map(cli => {
      const fams = (type !== 'marcas') ? (oppFam[cli]||[]) : [];
      const marcas = (type !== 'familias') ? (oppMarca[cli]||[]) : [];
      if (fams.length === 0 && marcas.length === 0) return '';
      return `<div class="opp-client-card">
        <div class="opp-client-name">📋 ${cli}</div>

  const myPos = sorted.indexOf(vend) + 1;
  const myTotal = MESES.reduce((s,m)=>s+(vvm[vend]?.[m]||0),0);
  const above = sorted[myPos-2];
  const gapAbove = above ? MESES.reduce((s,m)=>s+(vvm[above]?.[m]||0),0) - myTotal : 0;

  const rl = document.getElementById('my-ranking-list');
  rl.innerHTML = sorted.map((v,i) => {
    const total = MESES.reduce((s,m)=>s+(vvm[v]?.[m]||0),0);
    const isMe = v === vend;
    const barW = Math.round(total/maxTotal*100);
    return `<div class="ranking-item" style="${isMe?'background:var(--yellow-light);border-radius:8px;padding:12px':''}">
      <div class="rank-pos ${isMe ? 'me' : posClasses[i]||'normal'}">${i+1}</div>
      <div class="rank-name">
        ${v}${isMe?' <b style="color:var(--accent)">(vos)</b>':''}
        <div class="rank-sub">${Object.keys(SD.vendedor_detalle[v]?.clientes_mes?.['2026-03']||{}).length} clientes en Marzo</div>
      </div>
      <div class="rank-bar-wrap">
        <div class="rank-bar-bg">
          <div class="rank-bar ${isMe?'me':''}" style="width:${barW}%;${!isMe?`background:${VEND_COLORS[v]||'#888'}`:''}"></div>
        </div>
      </div>
      <div class="rank-amount" style="color:${isMe?'var(--accent)':VEND_COLORS[v]||'#888'}">${fmt(total)}</div>
    </div>`;
  }).join('');

  setTimeout(() => {
    destroyChart('rank-evol');
    charts['rank-evol'] = new Chart(document.getElementById('chart-rank-evol'), {
      type: 'line',
      data: {
        labels: ['Enero','Febrero','Marzo'],
        datasets: sorted.map(v => ({
          label: v.split(' ')[0] + (v===vend?' (vos)':''),
          data: MESES.map(m=>vvm[v]?.[m]||0),
          borderColor: v===vend ? '#E8A020' : VEND_COLORS[v]||'#ccc',
          borderWidth: v===vend ? 3 : 1.5,
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: v===vend ? 7 : 4,
        }))
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}},
        scales:{y:{ticks:{callback:v=>fmt(v)}}} }
    });

    destroyChart('rank-mes');
    charts['rank-mes'] = new Chart(document.getElementById('chart-rank-mes'), {
      type: 'bar',
      data: {
        labels: ['Enero','Febrero','Marzo'],
        datasets: sorted.map(v => ({
          label: v.split(' ')[0],
          data: MESES.map(m=>vvm[v]?.[m]||0),
          backgroundColor: VEND_COLORS[v]||'#888',
        }))
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}},
        scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>fmt(v)}}} }
    });
  }, 50);
}
</script>
</body>
</html>
