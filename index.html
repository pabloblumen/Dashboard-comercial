<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Comercial — ABC + Multicap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --navy:#1B2A47;--navy2:#2D4073;--navy3:#3D5A99;
  --accent:#E8A020;--green:#1E8449;--red:#C0392B;--orange:#E67E22;
  --abc:#2E86AB;--mc:#7B2D8B;
  --bg:#F0F4FA;--card:#fff;--border:#DEE2EC;--text:#1A1A2E;--text2:#555577;
  --green-light:#D5F5E3;--red-light:#FADBD8;--orange-light:#FDEBD0;--yellow-light:#FEF9E7;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text)}
/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--navy2))}
.lcard{background:#fff;border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.llogo{font-size:2.5rem;margin-bottom:8px}
.ltitle{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:4px}
.lsub{font-size:.85rem;color:var(--text2);margin-bottom:32px}
.llabel{font-size:.8rem;font-weight:600;color:var(--text2);text-align:left;margin-bottom:6px;display:block}
.lsel,.linp{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;margin-bottom:16px;outline:none;color:var(--text)}
.lsel:focus,.linp:focus{border-color:var(--navy2)}
.lbtn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
.lbtn:hover{background:var(--navy2)}
.lerr{color:var(--red);font-size:.85rem;margin-top:8px;display:none}
/* APP */
#app{display:none}
.topbar{background:var(--navy);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tlogo{font-weight:800;font-size:1.1rem;letter-spacing:1px}
.tuser{font-size:.85rem;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px}
.tbtn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem}
.tbtn:hover{background:rgba(255,255,255,.2)}
/* TABS */
.tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:4px;overflow-x:auto}
.tab{padding:16px 20px;font-size:.88rem;font-weight:600;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.active{color:var(--navy);border-bottom-color:var(--accent)}
/* CONTENT */
.content{padding:24px;max-width:1400px;margin:0 auto}
.pane{display:none}.pane.active{display:block}
/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border-left:4px solid var(--accent)}
.kpi-lbl{font-size:.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-size:1.8rem;font-weight:800;color:var(--navy);line-height:1}
.kpi-sub{font-size:.78rem;color:var(--text2);margin-top:4px}
.card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.ctitle{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:.875rem}
.tbl th{background:var(--navy);color:#fff;padding:10px 14px;text-align:left;font-weight:600;font-size:.78rem;text-transform:uppercase}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:var(--bg)}
.tbl tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tscroll{overflow-x:auto}
/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.bg{background:var(--green-light);color:var(--green)}
.br{background:var(--red-light);color:var(--red)}
.bo{background:var(--orange-light);color:var(--orange)}
.bb{background:#EBF5FB;color:#1A5276}
.by{background:var(--yellow-light);color:#7D6608}
/* RANKING */
.ri{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rpos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0}
.gold{background:#F9E79F;color:#7D6608}.silver{background:#E8E8E8;color:#555}
.bronze{background:#FDEBD0;color:#784212}.rnorm{background:var(--bg);color:var(--text2)}
.rme{background:var(--navy);color:#fff}
.rname{flex:1;font-weight:600;font-size:.9rem}
.rsub{font-size:.75rem;font-weight:400;color:var(--text2)}
.rbar{flex:2}.rbg{background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.rbar-fill{height:8px;border-radius:4px}
.ramt{font-weight:800;font-size:.9rem;text-align:right;min-width:90px}
/* ALERTS */
.ai{padding:14px 16px;border-radius:10px;border-left:4px solid;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.ai.danger{background:var(--red-light);border-color:var(--red)}
.ai.warning{background:var(--orange-light);border-color:var(--orange)}
.ai.info{background:#EBF5FB;border-color:var(--abc)}
.ai-name{font-weight:700;font-size:.9rem}
.ai-det{font-size:.8rem;color:var(--text2);margin-top:2px}
.ai-amt{font-weight:800;font-size:.95rem;white-space:nowrap}
/* MISC */
.fbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.flbl{font-size:.8rem;font-weight:600;color:var(--text2)}
.fsel{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;background:#fff;color:var(--text);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--navy2)}
.srch{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;width:220px}
.srch:focus{outline:none;border-color:var(--navy2)}
.ch{position:relative;height:280px}
.ch-sm{position:relative;height:200px}
.ch-lg{position:relative;height:360px}
.empty{text-align:center;padding:40px;color:var(--text2)}
.empty .ico{font-size:2.5rem;margin-bottom:8px}
.pbar{margin-bottom:12px}
.pbar-row{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px}
.pbg{background:var(--bg);border-radius:6px;height:12px;overflow:hidden}
.pfill{height:12px;border-radius:6px}
.pfill.green{background:var(--green)}.pfill.orange{background:var(--orange)}.pfill.red{background:var(--red)}

.multi-sel { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.ms-item { display:flex; align-items:center; gap:6px; padding:6px 12px; background:var(--bg); border-radius:20px; font-size:.82rem; cursor:pointer; border:1.5px solid var(--border); }
.ms-item:hover { border-color:var(--navy2); }
.ms-item input { cursor:pointer; accent-color:var(--navy); }

/* MAP */
#leaflet-map{height:520px;width:100%;border-radius:8px}
.opp-card{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px}
.opp-cname{font-weight:700;font-size:.9rem;margin-bottom:8px;color:var(--navy)}
.opp-tags{display:flex;flex-wrap:wrap;gap:6px}
.opp-tag{padding:4px 10px;border-radius:16px;font-size:.75rem;font-weight:600}
.opp-f{background:#EBF5FB;color:#1A5276}.opp-m{background:#F5EEF8;color:#6C3483}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="llogo">📊</div>
    <div class="ltitle">Dashboard Comercial</div>
    <div class="lsub">ABC Accesorios + Multicapotas · Ene–Abr 2026</div>
    <label class="llabel">¿Quién sos?</label>
    <select class="lsel" id="usr" onchange="onUsrChange()">
      <option value="">— Seleccioná tu nombre —</option>
      <option>Matias Matozza</option><option>Veronica Albarracin</option>
      <option>Alejandro Contardo</option><option>Nahuel Pontino</option>
      <option>Oscar Luna</option><option>Hernan Villamil</option>
      <option value="gerencia">Gerencia</option>
    </select>
    <div id="pass-wrap" style="display:none">
      <label class="llabel">Contraseña</label>
      <input type="password" class="linp" id="upass" placeholder="Tu contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="lbtn" onclick="doLogin()">Ingresar →</button>
    <div class="lerr" id="lerr">Contraseña incorrecta</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="tlogo">📊 Dashboard Comercial</div>
      <div class="tuser" id="tuser">—</div>
    </div>
    <button class="tbtn" onclick="doLogout()">Salir</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

  if (!n || isNaN(n)) return '$0';
  var a = Math.abs(n);
  if (a >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (a >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (a >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';

  document.querySelectorAll('.tab').forEach(function(b,j){ b.classList.toggle('active',j===i); });
  document.querySelectorAll('.pane').forEach(function(p,j){ p.classList.toggle('active',j===i); });
  if (lmap) setTimeout(function(){ lmap.invalidateSize(); }, 150);
}
function el(id) { return document.getElementById(id); }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function onUsrChange() {
  var sel = el('usr').value;
  el('pass-wrap').style.display = sel ? 'block' : 'none';
  el('upass').value = '';
  el('lerr').style.display = 'none';
}
function doLogin() {
  var sel  = el('usr').value;
  var pass = el('upass').value;
  if (!sel) return;
  if (sel === 'gerencia') {
    if (pass !== GPASS) { el('lerr').style.display='block'; return; }
    isGer = true; user = 'gerencia';
  } else {
    var expected = VPASSES[sel];
    if (!expected || pass !== expected) { el('lerr').style.display='block'; return; }
    isGer = false; user = sel;
  }
  el('login').style.display = 'none';
  el('app').style.display   = 'block';
  el('tuser').textContent   = isGer ? '👔 Gerencia' : '👤 ' + user.split(' ')[0];
  buildApp();
}
function doLogout() {
  user = null; isGer = false;
  el('app').style.display = 'none';
  el('login').style.display = 'flex';
  el('usr').value = ''; el('upass').value = ''; el('pass-wrap').style.display='none';
  el('lerr').style.display = 'none';
  
  el('tabs').innerHTML = ''; el('content').innerHTML = '';
  Object.values(charts).forEach(function(c){ c.destroy(); }); charts = {};
  if (lmap) { lmap.remove(); lmap = null; llayer = null; }
}

// ── BUILD APP ─────────────────────────────────────────────────────────────────
function buildApp() {
  if (isGer) buildGerencia(); else buildVendedor(user);
}
function makeTabs(tabs) {
  el('tabs').innerHTML = tabs.map(function(t,i){
    return '<button class="tab'+(i===0?' active':'')+'" onclick="switchTab('+i+')">'+t+'</button>';
  }).join('');
  el('content').innerHTML = tabs.map(function(t,i){
    return '<div class="pane'+(i===0?' active':'')+'" id="pane'+i+'"></div>';
  }).join('');
}

// ── VENDEDORES ────────────────────────────────────────────────────────────────
function buildGVendedores() {
  var vvm = SD.venta_vend_mes;
  var sorted = VENDEDORES.slice().sort(function(a,b){
    return MESES.reduce(function(s,m){return s+(vvm[b][m]||0);},0) - MESES.reduce(function(s,m){return s+(vvm[a][m]||0);},0);
  });
  var maxT = MESES.reduce(function(s,m){return s+(vvm[sorted[0]][m]||0);},0);
  var pc = ['gold','silver','bronze','rnorm','rnorm','rnorm'];

  var rankHTML = sorted.map(function(v,i){
    var t = MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
    var ncli = Object.keys(SD.vendedor_detalle[v].clientes_mes['2026-03']||{}).length;
    return '<div class="ri">' +
      '<div class="rpos '+pc[i]+'">'+(i+1)+'</div>' +
      '<div class="rname">'+v+'<div class="rsub">'+ncli+' clientes activos Mar</div></div>' +
      '<div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+Math.round(t/maxT*100)+'%;background:'+VCOLORS[v]+'"></div></div></div>' +
      '<div class="ramt" style="color:'+VCOLORS[v]+'">'+fmt(t)+'</div>' +
    '</div>';
  }).join('');

  var avgT = sorted.reduce(function(s,v){return s+MESES.reduce(function(a,m){return a+(vvm[v][m]||0);},0);},0)/sorted.length;
  var tblHTML = '<div class="tscroll"><table class="tbl"><thead><tr>' +
    '<th>Vendedor</th><th class="num">% del líder</th><th class="num">vs Promedio</th><th>Tendencia</th><th class="num">Clientes</th></tr></thead><tbody>' +
    sorted.map(function(v){
      var t=MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
      var pct=Math.round(t/maxT*100);
      var vsAvg=Math.round((t-avgT)/avgT*100);
      var e=vvm[v][MESES[0]]||0, ult=vvm[v][MESES[MESES.length-1]]||0;
      var ncli=Object.keys(SD.vendedor_detalle[v].clientes_mes[MESES[MESES.length-1]]||{}).length;
      var badge=vsAvg>=0?'<span class="badge bg">▲ '+vsAvg+'%</span>':'<span class="badge br">▼ '+Math.abs(vsAvg)+'%</span>';
      return '<tr><td><b>'+v.split(' ')[0]+'</b></td>' +
        '<td class="num"><b>'+pct+'%</b></td>' +
        '<td class="num">'+badge+'</td>' +
        '<td>'+varBadge(ult,e)+'</td>' +
        '<td class="num">'+ncli+'</td></tr>';
    }).join('') +
    '</tbody></table></div>';

  el('pane1').innerHTML =
    '<div class="card"><div class="ctitle">🏆 Ranking — Q1 2026</div>'+rankHTML+'</div>' +
    '<div class="card"><div class="ctitle">📊 Detalle</div>'+tblHTML+'</div>';
}

  var marcas   = SD.geo.marcas_list;

  var mOpts = marcas.map(function(m){return '<option>'+m+'</option>';}).join('');

      '<span class="flbl">Ver:</span>' +
      '<select class="fsel" id="mmetric" onchange="refreshMap()"><option value="importe">Facturación</option><option value="clientes">Clientes</option></select>' +
      '<span class="flbl">Marca:</span>' +
      '<select class="fsel" id="mmarca" onchange="onMF(\'m\')"><option value="">Todas</option>'+mOpts+'</select>' +
      '<span class="flbl">Vendedor:</span>' +'<select class="fsel" id="mvendedor" onchange="onMF(\"v\")"><option value="">Todos</option>' +['Matias Matozza','Veronica Albarracin','Alejandro Contardo','Nahuel Pontino','Oscar Luna','Hernan Villamil'].map(function(v){return '<option>'+v+'</option>';}).join('') +'</select>' +'<span class="flbl">Familia:</span>' +

    '<div id="leaflet-map"></div></div>' +
    '<div class="g2">' +
      '<div class="card"><div class="ctitle">📊 Ranking de Provincias</div><div id="prov-rank"></div></div>' +
      '<div class="card" id="prov-det-card" style="display:none"><div class="ctitle">📍 <span id="prov-det-name"></span></div><div id="prov-det"></div></div>' +
    '</div>';

  setTimeout(function(){ initMap(); renderProvRank(); }, 200);
}
function getMapData() {
  var m = el('mmarca')    ? el('mmarca').value    : '';
  var f = el('mfamilia')  ? el('mfamilia').value  : '';
  var v = el('mvendedor') ? el('mvendedor').value : '';
  if (m) return SD.geo.marcas[m]    || {};
  if (f) return SD.geo.familias[f]  || {};
  if (v) return (SD.geo.vendedores && SD.geo.vendedores[v]) || {};
  return SD.geo.total || {};
}
function onMF(type) {
  if (type==='m') { el('mfamilia').value=''; if(el('mvendedor')) el('mvendedor').value=''; }
  if (type==='f') { el('mmarca').value='';   if(el('mvendedor')) el('mvendedor').value=''; }
  if (type==='v') { el('mmarca').value='';   el('mfamilia').value=''; }
  refreshMap(); renderProvRank();
}
function provColor(val, maxVal) {
  if (!val || val===0) return '#E8ECF4';
  var t = 0.15 + 0.85*(val/maxVal);
  return 'rgb('+Math.round(61*(1-t)+27*t)+','+Math.round(90*(1-t)+42*t)+','+Math.round(153*(1-t)+71*t)+')';
}
function initMap() {
  if (lmap) { lmap.remove(); lmap=null; llayer=null; }
  lmap = L.map('leaflet-map',{center:[-40,-65],zoom:4,zoomControl:true,scrollWheelZoom:false,attributionControl:false});
  refreshMap();
}
function refreshMap() {
  if (!lmap) return;
  var mapData = getMapData();
  var metric  = el('mmetric') ? el('mmetric').value : 'importe';
  var vals    = Object.values(mapData).map(function(d){ return metric==='importe'?d.importe:d.clientes; });
  var maxVal  = Math.max.apply(null, vals.concat([1]));

  if (llayer) { llayer.remove(); llayer=null; }
  llayer = L.geoJSON(GEO, {
    style: function(feature) {
      var pk  = PROV_MAP[feature.properties.name] || feature.properties.name;
      var d   = mapData[pk];
      var val = d ? (metric==='importe'?d.importe:d.clientes) : 0;
      return {fillColor:provColor(val,maxVal), fillOpacity:val>0?.85:.4, color:'white', weight:1.5};
    },
    onEachFeature: function(feature, layer) {
      var pk  = PROV_MAP[feature.properties.name] || feature.properties.name;
      var d   = mapData[pk];
      var lbl = d ? (metric==='importe'?fmt(d.importe):d.clientes+' clientes') : 'Sin datos';
      layer.bindTooltip('<b>'+feature.properties.name+'</b><br>'+lbl,{sticky:true,opacity:.95});
      layer.on({
        mouseover: function(e){ e.target.setStyle({weight:3,color:'#E8A020',fillOpacity:.95}); },
        mouseout:  function(e){ llayer.resetStyle(e.target); },
        click:     function(){  showProv(pk); }
      });
    }
  }).addTo(lmap);
  lmap.setView([-38, -65], 4);
  renderProvRank();
}
function renderProvRank() {
  var mapData = getMapData();
  var metric  = el('mmetric') ? el('mmetric').value : 'importe';
  var list = Object.entries(mapData)
    .map(function(e){ return {p:e[0],v:metric==='importe'?e[1].importe:e[1].clientes,d:e[1]}; })
    .filter(function(x){ return x.v>0; })
    .sort(function(a,b){ return b.v-a.v; });
  if (!el('prov-rank')) return;
  var maxR = list[0]?list[0].v:1;
  var pc = ['gold','silver','bronze'];
  el('prov-rank').innerHTML = list.map(function(item,i){
    var lbl = metric==='importe' ? fmt(item.v) : item.v+' clientes';
    var sub = metric==='importe' ? item.d.clientes+' clientes' : fmt(item.d.importe);
    return '<div class="ri" style="cursor:pointer" onclick="showProv(\''+item.p+'\')">'+
      '<div class="rpos '+(pc[i]||'rnorm')+'">'+(i+1)+'</div>'+
      '<div class="rname">'+item.p+'<div class="rsub">'+sub+'</div></div>'+
      '<div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+Math.round(item.v/maxR*100)+'%;background:var(--navy2)"></div></div></div>'+
      '<div class="ramt">'+lbl+'</div></div>';
  }).join('');
}
function showProv(prov) {
  var d = getMapData()[prov];
  if (!d) return;
  if (el('prov-det-card')) el('prov-det-card').style.display='block';
  if (el('prov-det-name')) el('prov-det-name').textContent=prov;
  if (el('prov-det')) el('prov-det').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'+
      '<div class="kpi" style="border-color:var(--navy);padding:12px"><div class="kpi-lbl">Facturación</div><div class="kpi-val" style="font-size:1.2rem">'+fmt(d.importe)+'</div></div>'+
      '<div class="kpi" style="border-color:var(--accent);padding:12px"><div class="kpi-lbl">Clientes</div><div class="kpi-val" style="font-size:1.2rem">'+d.clientes+'</div></div>'+
    '</div>'+
    '<div style="font-size:.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:8px">Top clientes</div>'+
    d.top_clientes.map(function(c){
      return '<div class="ai info">'+
        '<div><div class="ai-name" style="font-size:.85rem">'+c.nombre+'</div>'+
        '<div class="ai-det">'+(c.localidad?c.localidad+' · ':'')+c.segmento+'</div></div>'+
        '<div class="ai-amt" style="font-size:.85rem">'+fmt(c.importe)+'</div></div>';
    }).join('');
}

// ── FRECUENCIA ────────────────────────────────────────────────────────────────
function buildGFrecuencia() {
  var fs  = SD.freq_summary;
  var fd  = SD.freq_data;
  var tot = (fs['4_meses']||0)+(fs['3_meses']||0)+(fs['2_meses']||0)+(fs['1_mes']||0);
  var sorted = fd.slice().sort(function(a,b){return b.total-a.total;});
  var totVol = sorted.reduce(function(s,c){return s+c.total;},0);
  var cum=0, cp=sorted.map(function(c){cum+=c.total;return Math.round(cum/totVol*100);});
  var vOpts = VENDEDORES.map(function(v){return '<option>'+v+'</option>';}).join('');
  var sOpts = '<option>Terminal</option><option>Terminal Toyota</option><option>Especial</option><option>Dealer / Concesionaria</option><option>Aftermarket</option><option>Aftermarket - Sonax</option>';

function renderFreq() {

  if (fs2) d=d.filter(function(r){return r.segmento===fs2;});
  el('freq-tbody').innerHTML = d.map(function(r){
    var icon=r.meses_activo===3?'🟢 3/3':r.meses_activo===2?'🟡 2/3':'🔴 1/3';
    var bg=r.meses_activo===2?'background:#FEF9E7':r.meses_activo===1?'background:#FFF5F5':'';

}

// ── TABLERO (nuevo home) ──────────────────────────────────────────────────────
function buildVTablero(v) {
  var vvm  = SD.venta_vend_mes;

  var ultimo = MESES[MESES.length-1];
  var penult = MESES[MESES.length-2];

  var imp_meses = MESES.map(function(m){ return vvm[v][m]||0; });
  var total     = imp_meses.reduce(function(s,x){return s+x;},0);
  var m_ult     = imp_meses[MESES.length-1];
  var m_pen     = imp_meses[MESES.length-2];
  var cm_ult    = Object.keys(det.clientes_mes[ultimo]||{}).length;

  // Filters state
  var vFilters = {meses:[], cliente:'', marca:''};

  // Build top clients by month
  var topCli = {};
  MESES.forEach(function(m){
    var clis = det.clientes_mes[m] || {};
    topCli[m] = Object.entries(clis).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  });

  // Top clients overall
  var cliTotals = {};
  MESES.forEach(function(m){
    Object.entries(det.clientes_mes[m]||{}).forEach(function(e){
      cliTotals[e[0]] = (cliTotals[e[0]]||0) + e[1];
    });
  });
  var topCliAll = Object.entries(cliTotals).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});

  // Top marcas overall
  var marcaTotals = {};
  MESES.forEach(function(m){
    Object.entries(det.marcas_mes[m]||{}).forEach(function(e){
      marcaTotals[e[0]] = (marcaTotals[e[0]]||0) + e[1];
    });
  });
  var topMarcas = Object.entries(marcaTotals).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});

  // Top familias overall
  var famTotals = {};
  MESES.forEach(function(m){
    Object.entries(det.familias_mes[m]||{}).forEach(function(e){
      famTotals[e[0]] = (famTotals[e[0]]||0) + e[1];
    });
  });
  var topFams = Object.entries(famTotals).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});

  var col = VCOLORS[v]||'#2E86AB';
  var ultNombre = MESES_L[ultimo]||ultimo;

  el('pane0').innerHTML =
    // Filters
    '<div class="card" style="margin-bottom:16px">'+
      '<div class="ctitle" style="margin-bottom:12px">🔍 Filtros</div>'+
      '<div class="fbar">'+
        '<span class="flbl">Período:</span>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
          MESES.map(function(m){ return '<label class="ms-item"><input type="checkbox" value="'+m+'" onchange="applyVFilters(\''+v+'\')"> '+(MESES_L[m]||m)+'</label>'; }).join('')+
        '</div>'+
        '<span class="flbl">Cliente:</span>'+
        '<select class="fsel" id="vf-cli" onchange="applyVFilters(\''+v+'\')">'+
          '<option value="">Todos</option>'+
          topCliAll.slice(0,30).map(function(e){return '<option>'+e[0]+'</option>';}).join('')+
        '</select>'+
        '<span class="flbl">Marca:</span>'+
        '<select class="fsel" id="vf-marca" onchange="applyVFilters(\''+v+'\')">'+
          '<option value="">Todas</option>'+
          topMarcas.slice(0,20).map(function(e){return '<option>'+e[0]+'</option>';}).join('')+
        '</select>'+
        '<span class="flbl">Ver en:</span>'+
        '<select class="fsel" id="vf-metrica" onchange="applyVFilters(\''+v+'\')">'+
          '<option value="importe">$ Importe</option>'+
          '<option value="cantidad">Unidades</option>'+
        '</select>'+
        '<button class="tbtn" style="padding:7px 16px;background:var(--border);color:var(--text)" onclick="resetVFilters(\''+v+'\')">Limpiar</button>'+
      '</div>'+
    '</div>'+
    // KPIs
    '<div class="kpi-grid" id="v-kpis">'+
      kpi('Total período', fmt(total), MESES_L[MESES[0]]+' a '+ultNombre, 'var(--navy)')+
      kpi(ultNombre, fmt(m_ult), 'vs '+(MESES_L[penult]||penult)+': '+varBadge(m_ult,m_pen), col)+
      kpi('Clientes activos', cm_ult+'', 'en '+ultNombre, 'var(--green)')+
      kpi('Clientes en riesgo', det.clientes_caidos.length+'', 'sin compras en '+ultNombre, 'var(--red)')+
    '</div>'+
    // Charts row 1
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📈 Tu evolución</div><div class="ch"><canvas id="c-v-evol"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">🏆 Ranking de clientes</div><div class="ch"><canvas id="c-v-cli"></canvas></div></div>'+
    '</div>'+
    // Charts row 2
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">🏷️ Ranking de marcas</div><div class="ch"><canvas id="c-v-marca"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">📦 Ranking de familias</div><div class="ch"><canvas id="c-v-fam"></canvas></div></div>'+
    '</div>';

  // Store for filter updates
  window._vTableroData = {v:v, topCliAll:topCliAll, topMarcas:topMarcas, topFams:topFams, imp_meses:imp_meses, col:col};
  renderVCharts(v, topCliAll, topMarcas, topFams, imp_meses, col, 'importe');
}

function getMesesFiltrados() {
  var checks = document.querySelectorAll('#pane0 input[type=checkbox]:checked');
  return checks.length > 0 ? Array.from(checks).map(function(c){return c.value;}) : MESES;
}

function applyVFilters(v) {
  var det     = SD.vendedor_detalle[v];
  var mesesF  = getMesesFiltrados();
  var cliF    = el('vf-cli')    ? el('vf-cli').value    : '';
  var marcaF  = el('vf-marca')  ? el('vf-marca').value  : '';
  var metrica = el('vf-metrica')? el('vf-metrica').value : 'importe';
  var col     = VCOLORS[v]||'#2E86AB';

  // Filter transactions
  var txns = (SD.txn_summary||[]).filter(function(t){
    if (t.vendedor !== v) return false;
    if (!mesesF.includes(t.mes)) return false;
    if (cliF   && t.cliente !== cliF)  return false;
    if (marcaF && t.marca   !== marcaF) return false;
    return true;
  });

  var getVal = function(t){ return metrica==='cantidad' ? t.cantidad : t.importe; };

  // KPIs
  var totalF = txns.reduce(function(s,t){return s+getVal(t);},0);
  var cliSet = new Set(txns.map(function(t){return t.cliente;}));
  var ultNombre = MESES_L[MESES[MESES.length-1]]||'';
  var kpiEl = el('v-kpis');
  if (kpiEl) kpiEl.innerHTML =
    kpi('Total filtrado', metrica==='cantidad'?Math.round(totalF)+' uds':fmt(totalF), mesesF.map(function(m){return MESES_L[m]||m;}).join(', '), 'var(--navy)')+
    kpi('Clientes activos', cliSet.size+'', 'en selección', 'var(--green)')+
    kpi('Marcas vendidas', new Set(txns.map(function(t){return t.marca;})).size+'', '', 'var(--abc)')+
    kpi('Familias vendidas', new Set(txns.map(function(t){return t.familia;})).size+'', '', 'var(--accent)');

  // Rebuild aggregations
  var byMes = {}; mesesF.forEach(function(m){byMes[m]=0;});
  var byCli = {}, byMarca = {}, byFam = {};
  txns.forEach(function(t){
    byMes[t.mes]   = (byMes[t.mes]||0)   + getVal(t);
    byCli[t.cliente]= (byCli[t.cliente]||0) + getVal(t);
    byMarca[t.marca]= (byMarca[t.marca]||0) + getVal(t);
    byFam[t.familia]= (byFam[t.familia]||0) + getVal(t);
  });

  var imp_m  = mesesF.map(function(m){return byMes[m]||0;});
  var topCli  = Object.entries(byCli).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var topM    = Object.entries(byMarca).filter(function(e){return e[1]>0&&e[0]!=='Sin Marca';}).sort(function(a,b){return b[1]-a[1];});
  var topF    = Object.entries(byFam).filter(function(e){return e[1]>0&&e[0]!=='Sin Familia';}).sort(function(a,b){return b[1]-a[1];});

  renderVCharts(v, topCli, topM, topF, imp_m, col, metrica, mesesF);
}

function resetVFilters(v) {
  document.querySelectorAll('#pane0 input[type=checkbox]').forEach(function(c){c.checked=false;});
  if(el('vf-cli'))    el('vf-cli').value='';
  if(el('vf-marca'))  el('vf-marca').value='';
  if(el('vf-metrica'))el('vf-metrica').value='importe';
  buildVTablero(v);
}

function renderVCharts(v, topCli, topMarcas, topFams, imp_meses, col, metrica, mesesOverride) {
  var mesesLabels = (mesesOverride||MESES).map(function(m){return (MESES_L[m]||m).substring(0,3);});
  var yFmt = metrica==='cantidad' ? function(x){return Math.round(x)+'u';} : fmt;
  var COLS = ['#2E86AB','#E8A020','#1E8449','#C0392B','#7B2D8B','#117A65','#D35400','#8E44AD','#1A5276','#784212'];

  // Evolution
  dChart('c-v-evol');
  charts['c-v-evol'] = new Chart(el('c-v-evol'),{type:'bar',
    data:{labels:mesesLabels, datasets:[{data:imp_meses,backgroundColor:imp_meses.map(function(){return col;})}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:yFmt}}}}
  });

  // Top clients (horizontal bar)
  dChart('c-v-cli');
  if (topCli.length>0) charts['c-v-cli'] = new Chart(el('c-v-cli'),{type:'bar',
    data:{labels:topCli.map(function(e){return e[0].length>20?e[0].substring(0,20)+'…':e[0];}),
      datasets:[{data:topCli.map(function(e){return e[1];}),backgroundColor:COLS}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:yFmt}}}}
  });

  // Top marcas (horizontal bar)
  dChart('c-v-marca');
  if (topMarcas.length>0) charts['c-v-marca'] = new Chart(el('c-v-marca'),{type:'bar',
    data:{labels:topMarcas.slice(0,10).map(function(e){return e[0];}),
      datasets:[{data:topMarcas.slice(0,10).map(function(e){return e[1];}),backgroundColor:topMarcas.slice(0,10).map(function(e){return MCOLORS[e[0]]||'#888';})}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:yFmt}}}}
  });

  // Top familias (doughnut)
  dChart('c-v-fam');
  if (topFams.length>0) charts['c-v-fam'] = new Chart(el('c-v-fam'),{type:'doughnut',
    data:{labels:topFams.slice(0,10).map(function(e){return e[0];}),
      datasets:[{data:topFams.slice(0,10).map(function(e){return e[1];}),backgroundColor:COLS}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}}}
  });
}

// ── VENDEDORES ────────────────────────────────────────────────────────────────
function buildGVendedores() {
  var vvm = SD.venta_vend_mes;
  var sorted = VENDEDORES.slice().sort(function(a,b){
    return MESES.reduce(function(s,m){return s+(vvm[b][m]||0);},0) - MESES.reduce(function(s,m){return s+(vvm[a][m]||0);},0);
  });
  var maxT = MESES.reduce(function(s,m){return s+(vvm[sorted[0]][m]||0);},0);
  var pc = ['gold','silver','bronze','rnorm','rnorm','rnorm'];

  var rankHTML = sorted.map(function(v,i){
    var t = MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
    var ncli = Object.keys(SD.vendedor_detalle[v].clientes_mes['2026-03']||{}).length;
    return '<div class="ri">' +
      '<div class="rpos '+pc[i]+'">'+(i+1)+'</div>' +
      '<div class="rname">'+v+'<div class="rsub">'+ncli+' clientes activos Mar</div></div>' +
      '<div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+Math.round(t/maxT*100)+'%;background:'+VCOLORS[v]+'"></div></div></div>' +
      '<div class="ramt" style="color:'+VCOLORS[v]+'">'+fmt(t)+'</div>' +
    '</div>';
  }).join('');

  var avgT = sorted.reduce(function(s,v){return s+MESES.reduce(function(a,m){return a+(vvm[v][m]||0);},0);},0)/sorted.length;
  var tblHTML = '<div class="tscroll"><table class="tbl"><thead><tr>' +
    '<th>Vendedor</th><th class="num">% del líder</th><th class="num">vs Promedio</th><th>Tendencia</th><th class="num">Clientes</th></tr></thead><tbody>' +
    sorted.map(function(v){
      var t=MESES.reduce(function(s,m){return s+(vvm[v][m]||0);},0);
      var pct=Math.round(t/maxT*100);
      var vsAvg=Math.round((t-avgT)/avgT*100);
      var e=vvm[v][MESES[0]]||0, ult=vvm[v][MESES[MESES.length-1]]||0;
      var ncli=Object.keys(SD.vendedor_detalle[v].clientes_mes[MESES[MESES.length-1]]||{}).length;
      var badge=vsAvg>=0?'<span class="badge bg">▲ '+vsAvg+'%</span>':'<span class="badge br">▼ '+Math.abs(vsAvg)+'%</span>';
      return '<tr><td><b>'+v.split(' ')[0]+'</b></td>' +
        '<td class="num"><b>'+pct+'%</b></td>' +
        '<td class="num">'+badge+'</td>' +
        '<td>'+varBadge(ult,e)+'</td>' +
        '<td class="num">'+ncli+'</td></tr>';
    }).join('') +
    '</tbody></table></div>';

  el('pane1').innerHTML =
    '<div class="card"><div class="ctitle">🏆 Ranking — Q1 2026</div>'+rankHTML+'</div>' +
    '<div class="card"><div class="ctitle">📊 Detalle</div>'+tblHTML+'</div>';
}

    '</div>';

  setTimeout(function(){ initMap(); renderProvRank(); }, 200);
}
function getMapData() {
  var m = el('mmarca')    ? el('mmarca').value    : '';
  var f = el('mfamilia')  ? el('mfamilia').value  : '';
  var v = el('mvendedor') ? el('mvendedor').value : '';
  if (m) return SD.geo.marcas[m]    || {};
  if (f) return SD.geo.familias[f]  || {};
  if (v) return (SD.geo.vendedores && SD.geo.vendedores[v]) || {};
  return SD.geo.total || {};
}
function onMF(type) {
  if (type==='m') { el('mfamilia').value=''; if(el('mvendedor')) el('mvendedor').value=''; }
  if (type==='f') { el('mmarca').value='';   if(el('mvendedor')) el('mvendedor').value=''; }
  if (type==='v') { el('mmarca').value='';   el('mfamilia').value=''; }
  refreshMap(); renderProvRank();
}
function provColor(val, maxVal) {
  if (!val || val===0) return '#E8ECF4';
  var t = 0.15 + 0.85*(val/maxVal);
  return 'rgb('+Math.round(61*(1-t)+27*t)+','+Math.round(90*(1-t)+42*t)+','+Math.round(153*(1-t)+71*t)+')';
}
function initMap() {
  if (lmap) { lmap.remove(); lmap=null; llayer=null; }
  lmap = L.map('leaflet-map',{center:[-40,-65],zoom:4,zoomControl:true,scrollWheelZoom:false,attributionControl:false});
  refreshMap();
}
function refreshMap() {
  if (!lmap) return;
  var mapData = getMapData();
  var metric  = el('mmetric') ? el('mmetric').value : 'importe';
  var vals    = Object.values(mapData).map(function(d){ return metric==='importe'?d.importe:d.clientes; });
  var maxVal  = Math.max.apply(null, vals.concat([1]));

  if (llayer) { llayer.remove(); llayer=null; }
  llayer = L.geoJSON(GEO, {
    style: function(feature) {
      var pk  = PROV_MAP[feature.properties.name] || feature.properties.name;
      var d   = mapData[pk];
      var val = d ? (metric==='importe'?d.importe:d.clientes) : 0;
      return {fillColor:provColor(val,maxVal), fillOpacity:val>0?.85:.4, color:'white', weight:1.5};
    },
    onEachFeature: function(feature, layer) {
      var pk  = PROV_MAP[feature.properties.name] || feature.properties.name;
      var d   = mapData[pk];
      var lbl = d ? (metric==='importe'?fmt(d.importe):d.clientes+' clientes') : 'Sin datos';
      layer.bindTooltip('<b>'+feature.properties.name+'</b><br>'+lbl,{sticky:true,opacity:.95});
      layer.on({
        mouseover: function(e){ e.target.setStyle({weight:3,color:'#E8A020',fillOpacity:.95}); },
        mouseout:  function(e){ llayer.resetStyle(e.target); },
        click:     function(){  showProv(pk); }
      });
    }
  }).addTo(lmap);
  lmap.setView([-38, -65], 4);
  renderProvRank();
}
function renderProvRank() {
  var mapData = getMapData();
  var metric  = el('mmetric') ? el('mmetric').value : 'importe';
  var list = Object.entries(mapData)
    .map(function(e){ return {p:e[0],v:metric==='importe'?e[1].importe:e[1].clientes,d:e[1]}; })
    .filter(function(x){ return x.v>0; })
    .sort(function(a,b){ return b.v-a.v; });
  if (!el('prov-rank')) return;
  var maxR = list[0]?list[0].v:1;
  var pc = ['gold','silver','bronze'];
  el('prov-rank').innerHTML = list.map(function(item,i){
    var lbl = metric==='importe' ? fmt(item.v) : item.v+' clientes';
    var sub = metric==='importe' ? item.d.clientes+' clientes' : fmt(item.d.importe);
    return '<div class="ri" style="cursor:pointer" onclick="showProv(\''+item.p+'\')">'+
      '<div class="rpos '+(pc[i]||'rnorm')+'">'+(i+1)+'</div>'+
      '<div class="rname">'+item.p+'<div class="rsub">'+sub+'</div></div>'+
      '<div class="rbar"><div class="rbg"><div class="rbar-fill" style="width:'+Math.round(item.v/maxR*100)+'%;background:var(--navy2)"></div></div></div>'+
      '<div class="ramt">'+lbl+'</div></div>';
  }).join('');
}
function showProv(prov) {
  var d = getMapData()[prov];
  if (!d) return;
  if (el('prov-det-card')) el('prov-det-card').style.display='block';
  if (el('prov-det-name')) el('prov-det-name').textContent=prov;
  if (el('prov-det')) el('prov-det').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'+
      '<div class="kpi" style="border-color:var(--navy);padding:12px"><div class="kpi-lbl">Facturación</div><div class="kpi-val" style="font-size:1.2rem">'+fmt(d.importe)+'</div></div>'+
      '<div class="kpi" style="border-color:var(--accent);padding:12px"><div class="kpi-lbl">Clientes</div><div class="kpi-val" style="font-size:1.2rem">'+d.clientes+'</div></div>'+
    '</div>'+
    '<div style="font-size:.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:8px">Top clientes</div>'+
    d.top_clientes.map(function(c){
      return '<div class="ai info">'+
        '<div><div class="ai-name" style="font-size:.85rem">'+c.nombre+'</div>'+
        '<div class="ai-det">'+(c.localidad?c.localidad+' · ':'')+c.segmento+'</div></div>'+
        '<div class="ai-amt" style="font-size:.85rem">'+fmt(c.importe)+'</div></div>';
    }).join('');
}

// ── FRECUENCIA ────────────────────────────────────────────────────────────────
function buildGFrecuencia() {
  var fs  = SD.freq_summary;
  var fd  = SD.freq_data;
  var tot = (fs['4_meses']||0)+(fs['3_meses']||0)+(fs['2_meses']||0)+(fs['1_mes']||0);
  var sorted = fd.slice().sort(function(a,b){return b.total-a.total;});
  var totVol = sorted.reduce(function(s,c){return s+c.total;},0);
  var cum=0, cp=sorted.map(function(c){cum+=c.total;return Math.round(cum/totVol*100);});
  var vOpts = VENDEDORES.map(function(v){return '<option>'+v+'</option>';}).join('');

function renderFreq() {
  var ff=el('ff').value, fv=el('fv').value, fs2=el('fs').value;

  if (fs2) d=d.filter(function(r){return r.segmento===fs2;});
  el('freq-tbody').innerHTML = d.map(function(r){
    var icon=r.meses_activo===3?'🟢 3/3':r.meses_activo===2?'🟡 2/3':'🔴 1/3';

}

function renderOpps() {
  var srch = el('osrch').value.toLowerCase();
  var type = el('otype').value;
  var clis = window._oppClis.filter(function(c){ return c.toLowerCase().includes(srch); });
  var html = clis.slice(0,40).map(function(c){
    var fams  = type!=='marcas'  ? (window._oppF[c]||[]) : [];
    var marcas = type!=='familias' ? (window._oppM[c]||[]) : [];
    if (!fams.length && !marcas.length) return '';
    return '<div class="opp-card"><div class="opp-cname">📋 '+c+'</div><div class="opp-tags">'+
      fams.map(function(f){return '<span class="opp-tag opp-f">📦 '+f+'</span>';}).join('')+
      marcas.map(function(m){return '<span class="opp-tag opp-m">🏷️ '+m+'</span>';}).join('')+
    '</div></div>';
  }).join('');
  el('opp-cont').innerHTML = html || '<div class="empty"><div class="ico">🔍</div><p>No se encontraron resultados</p></div>';
}

      (myPos>1 ? kpi('Para subir al '+(myPos-1)+'°', fmt(gap), 'vs '+above.split(' ')[0], 'var(--orange)') : kpi('Posición', '🥇 Líder', '¡Vas primero!', 'var(--green)'))+

    }).join('')+'</div>'+

      '<div class="card"><div class="ctitle">📊 Tu evolución vs el equipo</div><div class="ch"><canvas id="c-rank-evol"></canvas></div></div>'+

    '</div>';

  setTimeout(function(){
    dChart('c-rank-evol');

    dChart('c-rank-mes');
    charts['c-rank-mes']=new Chart(el('c-rank-mes'),{type:'bar',data:{labels:MESES.map(function(m){return (MESES_L[m]||m).substring(0,3);}),datasets:sorted.map(function(sv){return{label:sv.split(' ')[0],data:MESES.map(function(m){return vvm[sv][m]||0;}),backgroundColor:VCOLORS[sv]||'#888'};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:fmt}}}}});

    dChart('c-medios');

function kpi2(lbl,val,sub,color) {
  return '<div class="kpi" style="border-color:'+color+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';
}

function renderFlujoChart() {
  var emp = el('fl-emp') ? el('fl-emp').value : 'CONSOLIDADO';
  var fl  = SD.flow.flujo_mensual[emp] || {};
  var MESES_L = {'2026-01':'Enero','2026-02':'Febrero','2026-03':'Marzo',
                 '2025-11':'Nov-25','2025-12':'Dic-25','2026-04':'Abr-26'};
  var meses = Object.keys(fl).sort();
  var cobrado    = meses.map(function(m){return fl[m].cobrado||0;});
  var facturado  = meses.map(function(m){return fl[m].facturado||0;});
  var labels = meses.map(function(m){return MESES_L[m]||m;});

  dChart('c-flujo');
  charts['c-flujo'] = new Chart(el('c-flujo'),{
    type:'bar',
    data:{labels:labels,datasets:[
      {label:'Facturado',data:facturado,backgroundColor:'rgba(46,134,171,0.8)',order:2},
      {label:'Cobrado', data:cobrado,  backgroundColor:'rgba(30,132,73,0.8)', order:2},
      {label:'Diferencia',data:meses.map(function(m,i){return cobrado[i]-facturado[i];}),
       type:'line',borderColor:'#E8A020',backgroundColor:'transparent',
       pointRadius:5,borderWidth:2,order:1},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom'}},
      scales:{y:{ticks:{callback:fmt}}}}
  });
}

function renderSaldos() {
  var fv   = el('fl-vend') ? el('fl-vend').value : '';
  var tipo = el('fl-tipo') ? el('fl-tipo').value : '';
  var data = SD.flow.saldos_clientes;
  if (fv)   data = data.filter(function(r){return r.vendedor===fv;});
  if (tipo==='deuda')    data = data.filter(function(r){return r.saldo>100000;});
  if (tipo==='adelanto') data = data.filter(function(r){return r.saldo<-100000;});

  el('saldos-tbody').innerHTML = data.slice(0,60).map(function(r){
    var pct = r.pct_cobrado !== null ? r.pct_cobrado+'%' : '—';
    var saldoColor = r.saldo > 100000 ? 'color:var(--red);font-weight:700' :
                     r.saldo < -100000 ? 'color:var(--green);font-weight:700' : '';
    var bg = r.saldo > 100000 ? 'background:#FFF5F5' : r.saldo < -100000 ? 'background:#F0FFF4' : '';
    return '<tr style="'+bg+'">'+
      '<td><b>'+r.cliente+'</b></td>'+
      '<td>'+r.vendedor+'</td>'+
      '<td class="num">'+fmt(r.facturado)+'</td>'+
      '<td class="num">'+fmt(r.cobrado)+'</td>'+
      '<td class="num" style="'+saldoColor+'">'+fmt(r.saldo)+'</td>'+
      '<td class="num">'+pct+'</td>'+
    '</tr>';
  }).join('');
}


// ── RETENCIÓN DE CLIENTES ─────────────────────────────────────────────────────
function buildGRetencion() {
  var ret = SD.retencion;
  var meses = SD.meses || Object.keys(ret);
  var ML = {'2026-01':'Enero','2026-02':'Febrero','2026-03':'Marzo','2026-04':'Abril'};

  // Build waterfall data
  var labels = meses.slice(1).map(function(m){ return ML[m]||m; });
  var nuevos      = meses.slice(1).map(function(m){ return ret[m] ? ret[m].nuevos      : 0; });
  var reactivados = meses.slice(1).map(function(m){ return ret[m] ? ret[m].reactivados : 0; });
  var retenidos   = meses.slice(1).map(function(m){ return ret[m] ? ret[m].retenidos   : 0; });
  var perdidos    = meses.slice(1).map(function(m){ return ret[m] ? ret[m].perdidos    : 0; });

  el('pane-ret').innerHTML =
    '<div class="kpi-grid">'+
      kpi('Nuevos en Abril',      (ret['2026-04']?ret['2026-04'].nuevos:0)+'',      'Compraron por primera vez', 'var(--green)')+
      kpi('Reactivados en Abril', (ret['2026-04']?ret['2026-04'].reactivados:0)+'', 'Volvieron después de ausencia', 'var(--abc)')+
      kpi('Retenidos en Abril',   (ret['2026-04']?ret['2026-04'].retenidos:0)+'',   'Compraron también en Marzo', 'var(--navy)')+
      kpi('Perdidos en Abril',    (ret['2026-04']?ret['2026-04'].perdidos:0)+'',    'Compraron en Marzo y no en Abril', 'var(--red)')+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📊 Evolución de la cartera</div>'+
        '<div class="ch"><canvas id="c-ret-evol"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">🔄 Tasa de retención mensual</div>'+
        '<div class="ch"><canvas id="c-ret-tasa"></canvas></div></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">🔴 Clientes perdidos en el último mes</div>'+
        buildPerdidosList(ret[meses[meses.length-1]])+
      '</div>'+
      '<div class="card"><div class="ctitle">🆕 Clientes nuevos y reactivados</div>'+
        buildNuevosList(ret[meses[meses.length-1]])+
      '</div>'+
    '</div>';

  setTimeout(function(){
    dChart('c-ret-evol');
    charts['c-ret-evol'] = new Chart(el('c-ret-evol'),{
      type:'bar',
      data:{labels:labels,datasets:[
        {label:'Nuevos',      data:nuevos,      backgroundColor:'#1E8449'},
        {label:'Reactivados', data:reactivados, backgroundColor:'#2E86AB'},
        {label:'Perdidos',    data:perdidos.map(function(v){return -v;}), backgroundColor:'#C0392B'},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},
        scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:function(v){return Math.abs(v);}}}}}
    });

    var tasas = meses.slice(1).map(function(m,i){
      var prev = ret[meses[i]] ? ret[meses[i]].total : 1;
      var rete = ret[m] ? ret[m].retenidos : 0;
      return prev > 0 ? Math.round(rete/prev*100) : 0;
    });
    dChart('c-ret-tasa');
    charts['c-ret-tasa'] = new Chart(el('c-ret-tasa'),{
      type:'line',
      data:{labels:labels,datasets:[{
        label:'% Retenidos',data:tasas,
        borderColor:'#2E86AB',backgroundColor:'rgba(46,134,171,0.1)',
        tension:0.3,pointRadius:6,fill:true,
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{y:{min:0,max:100,ticks:{callback:function(v){return v+'%';}}}},
        plugins:{legend:{display:false}}}
    });
  },50);
}

function buildPerdidosList(mesData) {
  if (!mesData || !mesData.perdidos_list || !mesData.perdidos_list.length)
    return '<div class="empty"><div class="ico">✅</div><p>Sin clientes perdidos</p></div>';
  return '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Vendedor</th><th>Segmento</th><th class="num">Historial</th></tr></thead><tbody>'+
    mesData.perdidos_list.slice(0,15).map(function(c){
      return '<tr><td><b>'+c.cliente+'</b></td><td>'+c.vendedor+'</td>'+
        '<td><span class="badge bb">'+c.segmento+'</span></td>'+
        '<td class="num">'+fmt(c.total_hist)+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}

function buildNuevosList(mesData) {
  if (!mesData) return '';
  var items = (mesData.nuevos_list||[]).map(function(c){return {c:c,tipo:'🆕 Nuevo'};})
    .concat((mesData.reactivados_list||[]).map(function(c){return {c:c,tipo:'🔄 Reactivado'};}));
  if (!items.length) return '<div class="empty"><div class="ico">—</div><p>Sin nuevos ni reactivados</p></div>';
  return '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Tipo</th></tr></thead><tbody>'+
    items.slice(0,15).map(function(x){
      return '<tr><td><b>'+x.c+'</b></td><td>'+x.tipo+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}

// ── INFORME VW ────────────────────────────────────────────────────────────────
function buildGVW() {
  var vw   = SD.vw;
  var ML   = {'2026-01':'Ene','2026-02':'Feb','2026-03':'Mar','2026-04':'Abr'};
  var MESES = SD.meses || ['2026-01','2026-02','2026-03','2026-04'];
  var prods = vw.productos;
  var criticos  = prods.filter(function(p){return p.riesgo_stock==='sin_stock'||p.riesgo_stock==='critico';});
  var bajos     = prods.filter(function(p){return p.riesgo_stock==='bajo';});
  var ok        = prods.filter(function(p){return p.riesgo_stock==='ok';});
  var multicap  = prods.filter(function(p){return p.riesgo_stock==='multicap';});

  el('pane-vw').innerHTML =
    '<div class="kpi-grid">'+
      kpi('TOTAL VW', fmt(vw.total), 'Facturado Ene-Abr 2026', 'var(--navy)')+
      kpi('SKUs vendidos', prods.length+'', 'productos distintos', 'var(--abc)')+
      kpi('⚠️ Riesgo crítico', criticos.length+'', 'sin stock o <1 mes cobertura', 'var(--red)')+
      kpi('⚡ Stock bajo', bajos.length+'', 'menos de 2 meses cobertura', 'var(--orange)')+
    '</div>'+

    // Evolution chart
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📈 Evolución mensual VW</div>'+
        '<div class="ch"><canvas id="c-vw-evol"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">🥧 Mix de productos por facturación</div>'+
        '<div class="ch"><canvas id="c-vw-mix"></canvas></div></div>'+
    '</div>'+

    // Stock alerts
    '<div class="card" style="border-left:4px solid var(--red)">'+
      '<div class="ctitle">🚨 Alertas de Stock — Productos sin cobertura suficiente</div>'+
      '<p style="font-size:.82rem;color:var(--text2);margin-bottom:16px">'+
        'Productos de ABC Accesorios. Stock negativo en productos Multicap se excluye (intercompany).'+
      '</p>'+
      '<div class="tscroll"><table class="tbl"><thead><tr>'+
        '<th>Producto</th>'+
        MESES.map(function(m){return '<th class="num">'+ML[m]+'</th>';}).join('')+
        '<th class="num">Stock</th><th>Cobertura</th><th>Riesgo</th>'+
      '</tr></thead><tbody>'+
      criticos.concat(bajos).map(function(p){
        var avgQty = p.cantidad_total / Math.max(p.meses_activo,1);
        var cob = p.stock !== null && avgQty > 0 ? (p.stock/avgQty).toFixed(1)+' meses' : '—';
        var badge = p.riesgo_stock==='sin_stock'||p.riesgo_stock==='critico'
          ? '<span class="badge br">🔴 Crítico</span>'
          : '<span class="badge bo">⚡ Bajo</span>';
        return '<tr style="background:'+(p.riesgo_stock==='sin_stock'||p.riesgo_stock==='critico'?'#FFF5F5':'#FFF9F0')+'">' +
          '<td><b>'+p.producto+'</b></td>'+
          MESES.map(function(m){
            var v = p.imp_meses[m]||0;
            return '<td class="num">'+(v>0?fmt(v):'—')+'</td>';
          }).join('')+
          '<td class="num" style="color:'+(p.stock<0?'var(--red)':'inherit')+'">'+(p.stock!==null?p.stock:'?')+'</td>'+
          '<td>'+cob+'</td><td>'+badge+'</td></tr>';
      }).join('')+
      '</tbody></table></div>'+
    '</div>'+

    // Full product table
    '<div class="card">'+
      '<div class="ctitle">📋 Detalle completo por producto</div>'+
      '<div class="fbar">'+
        '<span class="flbl">Riesgo:</span>'+
        '<select class="fsel" id="vw-riesgo" onchange="renderVWTable()">'+
          '<option value="">Todos</option>'+
          '<option value="sin_stock">Sin stock</option>'+
          '<option value="critico">Crítico</option>'+
          '<option value="bajo">Bajo</option>'+
          '<option value="ok">OK</option>'+
          '<option value="multicap">Multicap</option>'+
        '</select>'+
        '<input type="text" class="srch" id="vw-srch" placeholder="Buscar producto..." oninput="renderVWTable()">'+
      '</div>'+
      '<div class="tscroll"><table class="tbl"><thead><tr>'+
        '<th>Producto</th>'+
        MESES.map(function(m){return '<th class="num">'+ML[m]+'</th>';}).join('')+
        '<th class="num">Total</th><th class="num">Uds.</th><th class="num">Stock</th><th>Riesgo</th>'+
      '</tr></thead><tbody id="vw-tbody"></tbody></table></div>'+
    '</div>';

  setTimeout(function(){
    // Evolution chart
    var evoData = MESES.map(function(m){return vw.resumen_meses[m]||0;});
    dChart('c-vw-evol');
    charts['c-vw-evol'] = new Chart(el('c-vw-evol'),{
      type:'bar',
      data:{labels:MESES.map(function(m){return ML[m]||m;}),
        datasets:[{data:evoData,backgroundColor:MESES.map(function(_,i){
          return ['#2E86AB','#1E8449','#7B2D8B','#E8A020'][i]||'#888';
        })}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{ticks:{callback:fmt}}}}
    });

    // Mix pie - top 8 products
    var top8 = prods.slice(0,8);
    dChart('c-vw-mix');
    charts['c-vw-mix'] = new Chart(el('c-vw-mix'),{
      type:'doughnut',
      data:{labels:top8.map(function(p){return p.producto.substring(0,30);}),
        datasets:[{data:top8.map(function(p){return p.importe_total;}),
          backgroundColor:['#2E86AB','#1E8449','#E8A020','#C0392B','#7B2D8B','#117A65','#D35400','#8E44AD']}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}
    });
  },50);
  renderVWTable();
}

function renderVWTable() {
  var riesgo = el('vw-riesgo') ? el('vw-riesgo').value : '';
  var srch   = (el('vw-srch') ? el('vw-srch').value : '').toLowerCase();
  var MESES  = SD.meses || ['2026-01','2026-02','2026-03','2026-04'];
  var ML     = {'2026-01':'Ene','2026-02':'Feb','2026-03':'Mar','2026-04':'Abr'};
  var prods  = SD.vw.productos;
  if (riesgo) prods = prods.filter(function(p){return p.riesgo_stock===riesgo;});
  if (srch)   prods = prods.filter(function(p){return p.producto.toLowerCase().includes(srch);});
  var rBadge = {'sin_stock':'<span class="badge br">🔴 Sin stock</span>','critico':'<span class="badge br">🔴 Crítico</span>','bajo':'<span class="badge bo">⚡ Bajo</span>','ok':'<span class="badge bg">✅ OK</span>','multicap':'<span class="badge bb">Multicap</span>','sin_dato':'<span class="badge by">?</span>'};
  var tbody = el('vw-tbody');
  if (tbody) tbody.innerHTML = prods.map(function(p){
    var bg = p.riesgo_stock==='sin_stock'||p.riesgo_stock==='critico'?'background:#FFF5F5':p.riesgo_stock==='bajo'?'background:#FFF9F0':'';
    return '<tr style="'+bg+'"><td>'+p.producto+'</td>'+
      MESES.map(function(m){var v=p.imp_meses[m]||0;return '<td class="num">'+(v>0?fmt(v):'—')+'</td>';}).join('')+
      '<td class="num"><b>'+fmt(p.importe_total)+'</b></td>'+
      '<td class="num">'+p.cantidad_total+'</td>'+
      '<td class="num" style="color:'+(p.stock<0?'var(--red)':'inherit')+'">'+(p.stock!==null?p.stock:'?')+'</td>'+
      '<td>'+(rBadge[p.riesgo_stock]||'')+'</td></tr>';
  }).join('');
}

    '<div class="card" id="gfilter-results">'+
      '<div class="ctitle">📊 Vista filtrada</div>'+
      '<div id="gfilter-content"><div class="empty"><div class="ico">☝️</div><p>Seleccioná filtros arriba y hacé clic en Aplicar</p></div></div>'+
    '</div>';
}

function getChecked(groupId) {
  var checks = document.querySelectorAll('#ms-'+groupId+' input:checked');
  return Array.from(checks).map(function(c){return c.value;});
}

function applyGFilters() {
  var filters = {
    meses:      getChecked('meses'),
    vendedores: getChecked('vendedores'),
    marcas:     getChecked('marcas'),
    familias:   getChecked('familias'),
    segmentos:  getChecked('segmentos'),
  };

  // Filter txn_summary
  var txns = SD.txn_summary || [];
  var filtered = txns.filter(function(t){
    if (filters.meses.length      && !filters.meses.includes(t.mes))           return false;
    if (filters.vendedores.length && !filters.vendedores.includes(t.vendedor)) return false;
    if (filters.marcas.length     && !filters.marcas.includes(t.marca))        return false;
    if (filters.familias.length   && !filters.familias.includes(t.familia))    return false;
    if (filters.segmentos.length  && !filters.segmentos.includes(t.segmento))  return false;
    return true;
  });

  var totalFilt = filtered.reduce(function(s,t){return s+t.importe;},0);
  var ML = {'2026-01':'Enero','2026-02':'Febrero','2026-03':'Marzo','2026-04':'Abril'};

  // Aggregate by mes, vendedor, marca
  var byMes = {}, byVend = {}, byMarca = {}, byCli = {};
  filtered.forEach(function(t){
    byMes[t.mes]      = (byMes[t.mes]||0)+t.importe;
    byVend[t.vendedor]= (byVend[t.vendedor]||0)+t.importe;
    byMarca[t.marca]  = (byMarca[t.marca]||0)+t.importe;
    byCli[t.cliente]  = (byCli[t.cliente]||0)+t.importe;
  });

  var mesSorted  = Object.entries(byMes).sort(function(a,b){return a[0].localeCompare(b[0]);});
  var vendSorted = Object.entries(byVend).sort(function(a,b){return b[1]-a[1];});
  var marcSorted = Object.entries(byMarca).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var cliSorted  = Object.entries(byCli).sort(function(a,b){return b[1]-a[1];}).slice(0,15);

  var activeFilters = Object.entries(filters)
    .filter(function(e){return e[1].length>0;})
    .map(function(e){return '<span class="badge bb">'+e[0]+': '+e[1].join(', ')+'</span>';}).join(' ');

  el('gfilter-content').innerHTML =
    '<div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">'+activeFilters+'</div>'+
    '<div class="kpi-grid">'+
      kpi('Total filtrado', fmt(totalFilt), filtered.length+' transacciones', 'var(--navy)')+
      kpi('Clientes', Object.keys(byCli).length+'', 'distintos', 'var(--abc)')+
      kpi('Marcas', Object.keys(byMarca).length+'', 'distintas', 'var(--accent)')+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">📅 Por mes</div>'+
        '<div class="ch-sm"><canvas id="c-gf-mes"></canvas></div></div>'+
      '<div class="card"><div class="ctitle">👥 Por vendedor</div>'+
        '<div class="ch-sm"><canvas id="c-gf-vend"></canvas></div></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctitle">🏷️ Top marcas</div>'+
        '<div class="tscroll"><table class="tbl"><thead><tr><th>Marca</th><th class="num">Importe</th><th>% del total</th></tr></thead><tbody>'+
        marcSorted.map(function(e){
          return '<tr><td>'+e[0]+'</td><td class="num">'+fmt(e[1])+'</td>'+
            '<td><div class="pbg" style="width:120px"><div class="pfill green" style="width:'+Math.round(e[1]/totalFilt*100)+'%"></div></div></td></tr>';
        }).join('')+'</tbody></table></div></div>'+
      '<div class="card"><div class="ctitle">🏆 Top clientes</div>'+
        '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th class="num">Importe</th></tr></thead><tbody>'+
        cliSorted.map(function(e){return '<tr><td>'+e[0]+'</td><td class="num"><b>'+fmt(e[1])+'</b></td></tr>';}).join('')+
        '</tbody></table></div></div>'+
    '</div>';

  setTimeout(function(){
    dChart('c-gf-mes');
    charts['c-gf-mes'] = new Chart(el('c-gf-mes'),{type:'bar',
      data:{labels:mesSorted.map(function(e){return ML[e[0]]||e[0];}),
        datasets:[{data:mesSorted.map(function(e){return e[1];}),backgroundColor:'#2E86AB'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmt}}}}
    });
    dChart('c-gf-vend');
    charts['c-gf-vend'] = new Chart(el('c-gf-vend'),{type:'bar',
      data:{labels:vendSorted.map(function(e){return e[0].split(' ')[0];}),
        datasets:[{data:vendSorted.map(function(e){return e[1];}),
          backgroundColor:vendSorted.map(function(e){return {'Matias':'#2E86AB','Veronica':'#E8A020','Alejandro':'#1E8449','Nahuel':'#8E44AD','Oscar':'#E74C3C','Hernan':'#117A65'}[e[0].split(' ')[0]]||'#888';})}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmt}}}}
    });
  },50);
}

function resetGFilters() {
  document.querySelectorAll('.ms-item input').forEach(function(c){c.checked=false;});
  el('gfilter-content').innerHTML = '<div class="empty"><div class="ico">☝️</div><p>Seleccioná filtros arriba y hacé clic en Aplicar</p></div>';
}

</script>
</body>
</html>
